<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EAS PMO Platform v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#080D1A;--bg1:#0D1526;--bg2:#111D35;--bg3:#172240;
  --surface:#1A2845;--surfH:#1F3052;
  --border:#243350;--borderL:#2E4070;
  --text:#E8EDF5;--muted:#7A8BAA;--dim:#3A4A62;
  --accent:#3B7FE8;--accentD:#1E3D6E;--accentG:rgba(59,127,232,0.12);
  --green:#22C55E;--greenD:#14532D;--greenG:rgba(34,197,94,0.1);
  --amber:#F59E0B;--amberD:#78350F;--amberG:rgba(245,158,11,0.1);
  --red:#EF4444;--redD:#7F1D1D;--redG:rgba(239,68,68,0.1);
  --grey:#64748B;--greyD:#1E293B;
  --teal:#14B8A6;--tealD:#134E4A;
  --purple:#A78BFA;--purpleD:#2E1065;
  --font:'Outfit',sans-serif;
  --mono:'DM Mono',monospace;
  --display:'Syne',sans-serif;
}
body{background:var(--bg0);color:var(--text);font-family:var(--font);min-height:100vh;display:flex}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg0)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.fade{animation:fadeIn .18s ease forwards}
.pulse{animation:pulse 2s ease infinite}

/* ── SIDEBAR ── */
#sidebar{width:220px;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;min-height:100vh;position:sticky;top:0;height:100vh;overflow:hidden}
.sb-logo{padding:16px 16px 12px;border-bottom:1px solid var(--border)}
.sb-logo-sub{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:3px}
.sb-logo-title{font-size:15px;font-weight:800;color:var(--text);font-family:var(--display)}
.sb-live{display:flex;align-items:center;gap:6px;margin-top:6px}
.sb-prog{padding:9px 16px 8px;border-bottom:1px solid var(--border)}
.sb-prog-label{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;margin-bottom:2px}
.sb-prog-val{font-size:11px;color:var(--muted);line-height:1.5}
nav{flex:1;padding:8px;overflow-y:auto}
.nav-section{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);padding:10px 10px 4px;display:block}
.nav-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;border-radius:5px;border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;margin-bottom:1px;text-align:left;transition:all .1s;font-family:var(--font);border-left:2px solid transparent}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{background:var(--accentG);color:var(--accent);font-weight:700;border-left-color:var(--accent)}
.nav-icon{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.nav-badge{background:var(--amberD);color:var(--amber);border-radius:3px;padding:0 5px;font-size:10px;font-weight:800;font-family:var(--mono);margin-left:auto}
.nav-badge.red{background:var(--redD);color:var(--red)}
.sb-footer{padding:8px 16px;border-top:1px solid var(--border);font-size:9px;color:var(--dim);font-family:var(--mono);display:flex;justify-content:space-between;align-items:center}
.sb-clear{background:none;border:none;color:var(--dim);font-size:9px;cursor:pointer;font-family:var(--mono);padding:2px 4px;border-radius:3px;transition:color .1s}
.sb-clear:hover{color:var(--red)}

/* ── MAIN ── */
#main{flex:1;overflow:auto}
#content{max-width:1080px;margin:0 auto;padding:24px 26px 60px}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px 18px}
.card-hover{cursor:pointer;transition:background .1s}
.card-hover:hover{background:var(--surfH)}
.card-sm{padding:12px 14px}

/* ── TYPOGRAPHY ── */
.slabel{font-size:9px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--dim);margin-bottom:10px;display:block}
.page-title{font-size:19px;font-weight:800;color:var(--text);font-family:var(--display);margin-bottom:4px}

/* ── BADGES ── */
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.2px;white-space:nowrap}
.rag-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px 3px 7px;border-radius:4px;font-size:11px;font-weight:700;white-space:nowrap;cursor:pointer;transition:opacity .1s}
.rag-chip:hover{opacity:.75}
.rag-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* ── METRICS ── */
.metrics{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;flex:1;min-width:110px;cursor:pointer;transition:all .1s}
.metric:hover{background:var(--surfH);border-color:var(--borderL)}
.metric-val{font-size:22px;font-weight:800;font-family:var(--mono);letter-spacing:-1px;line-height:1}
.metric-label{font-size:11px;font-weight:600;color:var(--text);margin-top:3px}
.metric-sub{font-size:10px;color:var(--muted);margin-top:1px}

/* ── BAR ── */
.bar-track{background:var(--bg2);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .5s ease}

/* ── TABLES ── */
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:6px 8px;color:var(--dim);font-weight:700;font-size:9px;letter-spacing:1.2px;text-transform:uppercase;border-bottom:1px solid var(--border)}
td{padding:8px 8px;border-bottom:1px solid var(--bg3)}
tr.clickable{cursor:pointer}
tr.clickable:hover td{background:var(--bg3)}

/* ── FORMS ── */
.flabel{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:block}
.frow{margin-bottom:12px}
.finp,.fsel,.ftxt{width:100%;background:var(--bg1);border:1px solid var(--border);border-radius:6px;padding:7px 11px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:border-color .1s}
.ftxt{resize:vertical}
.finp:focus,.fsel:focus,.ftxt:focus{border-color:var(--accent)}
.fgrid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* ── BUTTONS ── */
.btn{padding:7px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);transition:opacity .1s;border:1px solid}
.btn:hover{opacity:.8}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-secondary{background:transparent;color:var(--accent);border-color:var(--accentD)}
.btn-ghost{background:transparent;color:var(--muted);border-color:transparent}
.btn-danger{background:transparent;color:var(--red);border-color:var(--redD)}
.btn-amber{background:var(--amberG);color:var(--amber);border-color:var(--amberD)}
.btn-green{background:var(--greenG);color:var(--green);border-color:var(--greenD)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn:disabled{opacity:.35;cursor:not-allowed}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px)}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:100%;max-width:660px;max-height:92vh;overflow:auto;box-shadow:0 40px 100px rgba(0,0,0,.7)}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:1}
.modal-title{font-size:14px;font-weight:700;color:var(--text);font-family:var(--display)}
.modal-close{background:none;border:none;color:var(--muted);font-size:17px;cursor:pointer;padding:0 2px}
.modal-body{padding:18px 20px}
.modal-section{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin:18px 0 10px;border-bottom:1px solid var(--border);padding-bottom:6px}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);margin:12px 0}

/* ── LAYOUT ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.flex-row{display:flex;align-items:center;gap:10px}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.flex-col{display:flex;flex-direction:column;gap:8px}
.gap-6{gap:6px}.gap-8{gap:8px}.gap-12{gap:12px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}.mb-20{margin-bottom:20px}
.back-link{background:none;border:none;color:var(--accent);font-size:11px;font-weight:600;cursor:pointer;padding:0;margin-bottom:14px;font-family:var(--font);display:inline-flex;align-items:center;gap:5px}
.back-link:hover{text-decoration:underline}
.empty{font-size:12px;color:var(--muted);padding:20px;text-align:center;border:1px dashed var(--border);border-radius:6px;line-height:1.7}
.stream-bar{width:3px;border-radius:1px;flex-shrink:0}
.filter-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.pill{padding:4px 11px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .1s}
.pill:hover{border-color:var(--accent);color:var(--text)}
.pill.active{background:var(--accentD);color:var(--accent);border-color:var(--accentD)}
.prog-banner{background:linear-gradient(135deg,var(--bg3) 0%,var(--surface) 100%);border:1px solid var(--border);border-radius:8px;padding:18px 22px;margin-bottom:16px;position:relative;overflow:hidden}
.prog-banner::after{content:'';position:absolute;top:0;right:0;width:280px;height:100%;background:linear-gradient(90deg,transparent,var(--accentG));pointer-events:none}

/* ── RISK ── */
.risk-card{border-left:3px solid;border-radius:6px;padding:10px 12px;margin-bottom:8px;background:var(--bg2)}
.risk-high{border-color:#EF4444}
.risk-med{border-color:#F59E0B}
.risk-low{border-color:#22C55E}

/* ── MEETINGS ── */
.meeting-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:8px}
.agenda-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--bg3);align-items:flex-start}
.agenda-num{width:22px;height:22px;border-radius:50%;background:var(--accentD);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;font-family:var(--mono)}

/* ── TABS ── */
.tabs{display:flex;gap:2px;margin-bottom:16px;background:var(--bg2);border-radius:7px;padding:3px;border:1px solid var(--border)}
.tab{padding:6px 14px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .1s;border:none;background:transparent;font-family:var(--font)}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}

/* ── CALLOUT ── */
.callout{border-radius:6px;padding:10px 14px;font-size:12px;line-height:1.6;margin-bottom:12px}
.callout-info{background:var(--accentG);border:1px solid rgba(59,127,232,.2);color:#93C5FD}
.callout-warn{background:var(--amberG);border:1px solid rgba(245,158,11,.2);color:#FCD34D}
.callout-tip{background:var(--bg2);border:1px solid var(--border);color:var(--muted)}

/* ── SAVE INDICATOR ── */
#save-toast{position:fixed;bottom:20px;right:20px;background:var(--greenD);border:1px solid var(--green);color:var(--green);padding:8px 16px;border-radius:6px;font-size:11px;font-weight:700;font-family:var(--mono);z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
</style>
</head>
<body>

<div id="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-sub">Envision AS</div>
    <div class="sb-logo-title">PMO Platform</div>
    <div class="sb-live">
      <span class="pulse" style="width:5px;height:5px;border-radius:50%;background:var(--green);display:inline-block"></span>
      <span style="font-size:10px;color:var(--green);font-family:var(--mono)">LIVE · DATA SAVED</span>
    </div>
  </div>
  <div class="sb-prog">
    <div class="sb-prog-label">Programme</div>
    <div class="sb-prog-val" id="sb-prog-name">No programme set</div>
  </div>
  <nav id="nav"></nav>
  <div class="sb-footer">
    <span>EAS-PMO v3.0</span>
    <button class="sb-clear" onclick="clearAllData()" title="Clear all data">⊗ reset</button>
  </div>
</div>

<div id="main">
  <div id="content" class="fade"></div>
</div>

<div id="modal-overlay" class="overlay" style="display:none" onclick="closeModalOverlay(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div id="save-toast">✓ Saved</div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════════════════
const S = {
  programme: { name:"", client:"", governanceBody:"SteerCo", lead:"", status:"Active", startDate:"", reportingFreq:"Weekly" },
  streams: [],
  initiatives: [],
  activities: [],
  decisions: [],
  actions: [],
  risks: [],
  meetings: [],
  view: "setup",
  param: null,
  _initFilter: "All",
  _decTab: "Overdue",
  _reportTab: "portfolio",
  _meetTab: "steerco",
};

// ══════════════════════════════════════════════════════════════════════════════
// PERSISTENCE — localStorage
// ══════════════════════════════════════════════════════════════════════════════
const STORE_KEY = 'eas-pmo-v3';

function saveData(){
  try{
    const payload = {
      programme:S.programme, streams:S.streams, initiatives:S.initiatives,
      activities:S.activities, decisions:S.decisions, actions:S.actions,
      risks:S.risks, meetings:S.meetings
    };
    localStorage.setItem(STORE_KEY, JSON.stringify(payload));
    showToast();
  } catch(e){ console.warn('Save failed:',e); }
}

function loadData(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return;
    const d = JSON.parse(raw);
    if(d.programme)   Object.assign(S.programme, d.programme);
    if(d.streams)     S.streams     = d.streams;
    if(d.initiatives) S.initiatives = d.initiatives;
    if(d.activities)  S.activities  = d.activities;
    if(d.decisions)   S.decisions   = d.decisions;
    if(d.actions)     S.actions     = d.actions;
    if(d.risks)       S.risks       = d.risks;
    if(d.meetings)    S.meetings     = d.meetings;
    // Migrate: ensure kpis, milestones, teamMembers arrays exist
    S.initiatives.forEach(i=>{
      if(!i.kpis) i.kpis=[];
      if(!i.milestones) i.milestones=[];
      if(!i.teamMembers) i.teamMembers=[];
      if(!i.businessCase) i.businessCase={problem:"",baseline:"",actions:"",benefit:"",opBenefit:"",cost:"",payback:"",risks:"",recommendation:""};
    });
    S.streams.forEach(s=>{
      if(!s.teamMembers) s.teamMembers=[];
      if(!s.objectives) s.objectives="";
    });
  } catch(e){ console.warn('Load failed:',e); }
}

function clearAllData(){
  if(!confirm('Clear ALL programme data and start fresh? This cannot be undone.')) return;
  localStorage.removeItem(STORE_KEY);
  location.reload();
}
window.clearAllData = clearAllData;

let _toastTimer;
function showToast(){
  const t = document.getElementById('save-toast');
  t.style.opacity='1';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>{ t.style.opacity='0'; }, 1600);
}

// ══════════════════════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════════════════════
const uid = () => `x${Date.now()}${Math.random().toString(36).slice(2,6)}`;
const fmt = n => n>=1e6?`R${(n/1e6).toFixed(1)}m`:n>=1000?`R${(n/1000).toFixed(0)}k`:`R${n||0}`;
const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const today = () => new Date().toISOString().split("T")[0];
const isOverdue = due => due && due < today();

const ragAgg = rags => {
  if(!rags.length) return "On Track";
  if(rags.includes("Behind Schedule")) return "Behind Schedule";
  if(rags.includes("At Risk")) return "At Risk";
  if(rags.every(r=>r==="On Hold")) return "On Hold";
  return "On Track";
};

const RAG_COLOR = {
  "On Track":        {c:"#22C55E",d:"#14532D",b:"#22C55E33"},
  "At Risk":         {c:"#F59E0B",d:"#78350F",b:"#F59E0B33"},
  "Behind Schedule": {c:"#EF4444",d:"#7F1D1D",b:"#EF444433"},
  "On Hold":         {c:"#64748B",d:"#1E293B",b:"#64748B33"},
};
const STATUS_COLOR = {
  "Complete":    {c:"#22C55E",d:"#14532D"},
  "In Progress": {c:"#3B7FE8",d:"#1E3D6E"},
  "Not Started": {c:"#64748B",d:"#1E293B"},
  "Blocked":     {c:"#EF4444",d:"#7F1D1D"},
  "Open":        {c:"#F59E0B",d:"#78350F"},
  "Overdue":     {c:"#EF4444",d:"#7F1D1D"},
  "Made":        {c:"#22C55E",d:"#14532D"},
  "Done":        {c:"#22C55E",d:"#14532D"},
  "High":        {c:"#EF4444",d:"#7F1D1D"},
  "Medium":      {c:"#F59E0B",d:"#78350F"},
  "Low":         {c:"#22C55E",d:"#14532D"},
};
const STREAM_COLORS = ["#3B7FE8","#14B8A6","#22C55E","#A78BFA","#F59E0B","#EF4444","#EC4899","#F97316"];

function ragChip(status, onclick=""){
  const r=RAG_COLOR[status]||RAG_COLOR["On Hold"];
  const pulse=status==="Behind Schedule"?' class="pulse"':'';
  const clickAttr = onclick ? ` onclick="${onclick}"` : '';
  return `<span class="rag-chip" style="background:${r.d};color:${r.c};border:1px solid ${r.b}"${clickAttr}><span${pulse} class="rag-dot" style="background:${r.c}"></span>${esc(status)}</span>`;
}
function chip(label,color,dim){
  const s=STATUS_COLOR[label]||{c:color||"#64748B",d:dim||"#1E293B"};
  return `<span class="chip" style="background:${s.d};color:${s.c};border:1px solid ${s.c}22">${esc(label)}</span>`;
}
function bar(pct,color,height=4){
  return `<div class="bar-track" style="height:${height}px"><div class="bar-fill" style="width:${Math.min(100,pct||0)}%;background:${color||"#3B7FE8"};height:100%"></div></div>`;
}
function riskBadge(level){
  const m={High:"#EF4444",Medium:"#F59E0B",Low:"#22C55E"};
  return `<span style="background:${STATUS_COLOR[level]?.d||"#1E293B"};color:${m[level]||"#64748B"};border:1px solid ${m[level]||"#64748B"}33;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700">${esc(level)}</span>`;
}

// ══════════════════════════════════════════════════════════════════════════════
// NAV
// ══════════════════════════════════════════════════════════════════════════════
const NAV = [
  {section:"Programme"},
  {id:"setup",       icon:"⊞", label:"Setup"},
  {id:"dashboard",   icon:"⬡", label:"Dashboard"},
  {section:"Work"},
  {id:"streams",     icon:"◈", label:"Value Streams"},
  {id:"initiatives", icon:"◇", label:"Initiatives"},
  {id:"activities-all", icon:"✦", label:"All Activities"},
  {section:"Governance"},
  {id:"meetings",    icon:"⊙", label:"Meetings"},
  {id:"decisions",   icon:"⊡", label:"Decisions"},
  {id:"actions",     icon:"✓", label:"Actions"},
  {id:"risks",       icon:"⚑", label:"Risk Register"},
  {section:"Reports"},
  {id:"reporting",   icon:"▤", label:"Reporting"},
  {id:"templates",   icon:"☰", label:"Templates"},
];

function renderNav(){
  const openDec = S.decisions.filter(d=>d.status==="Open"||d.status==="Overdue").length;
  const overdueAct = S.actions.filter(a=>a.status==="Overdue"||isOverdue(a.due)&&a.status!=="Done").length;
  const openRisk = S.risks.filter(r=>r.status!=="Closed").filter(r=>r.level==="High").length;
  const badges = {decisions:openDec, actions:overdueAct, risks:openRisk};
  document.getElementById("nav").innerHTML = NAV.map(item=>{
    if(item.section) return `<span class="nav-section">${item.section}</span>`;
    const isActive = S.view===item.id || (item.id==="streams" && (S.view==="stream-detail"||S.view==="stream-edit")) || (item.id==="initiatives" && S.view==="init-detail");
    const b = badges[item.id];
    return `<button class="nav-btn${isActive?" active":""}" onclick="go('${item.id}')">
      <span class="nav-icon">${item.icon}</span>
      <span style="flex:1">${item.label}</span>
      ${b>0?`<span class="nav-badge${item.id==="actions"||item.id==="risks"?" red":""}">${b}</span>`:""}
    </button>`;
  }).join("");
  document.getElementById("sb-prog-name").textContent = S.programme.name || "No programme set";
}

function go(view, param=null){
  S.view=view; S.param=param;
  renderNav(); render();
  document.getElementById("main").scrollTo(0,0);
}
window.go=go;

// ══════════════════════════════════════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════════════════════════════════════
function openModal(title, html){
  document.getElementById("modal-title").textContent=title;
  document.getElementById("modal-body").innerHTML=html;
  document.getElementById("modal-overlay").style.display="flex";
}
function closeModal(){
  document.getElementById("modal-overlay").style.display="none";
  document.getElementById("modal-body").innerHTML="";
}
function closeModalOverlay(e){
  if(e.target===document.getElementById("modal-overlay")) closeModal();
}
window.closeModal=closeModal;
window.closeModalOverlay=closeModalOverlay;

// ══════════════════════════════════════════════════════════════════════════════
// RENDER ROUTER
// ══════════════════════════════════════════════════════════════════════════════
function render(){
  const el=document.getElementById("content");
  el.className="fade";
  void el.offsetWidth;
  switch(S.view){
    case "setup":          el.innerHTML=renderSetup(); break;
    case "dashboard":      el.innerHTML=renderDashboard(); break;
    case "streams":        el.innerHTML=renderStreams(); break;
    case "stream-detail":  el.innerHTML=renderStreamDetail(S.param); break;
    case "stream-edit":    el.innerHTML=renderStreamEdit(S.param); break;
    case "initiatives":    el.innerHTML=renderInitiatives(); break;
    case "init-detail":    el.innerHTML=renderInitDetail(S.param); break;
    case "activities-all": el.innerHTML=renderAllActivities(); break;
    case "meetings":       el.innerHTML=renderMeetings(); break;
    case "decisions":      el.innerHTML=renderDecisions(); break;
    case "actions":        el.innerHTML=renderActions(); break;
    case "risks":          el.innerHTML=renderRisks(); break;
    case "reporting":      el.innerHTML=renderReporting(); break;
    case "templates":      el.innerHTML=renderTemplates(); break;
    default: el.innerHTML="<div class='empty'>Unknown view</div>";
  }
}

function saveProgramme(){
  S.programme.name=document.getElementById("s-name").value.trim();
  S.programme.client=document.getElementById("s-client").value.trim();
  S.programme.lead=document.getElementById("s-lead").value.trim();
  S.programme.governanceBody=document.getElementById("s-gb").value.trim()||"SteerCo";
  S.programme.startDate=document.getElementById("s-date").value;
  S.programme.status=document.getElementById("s-status").value;
  S.programme.reportingFreq=document.getElementById("s-freq").value;
  saveData(); renderNav(); render();
}
window.saveProgramme=saveProgramme;

function showAddStream(){
  const used=S.streams.length;
  openModal("Add Value Stream",`
    <div class="frow"><label class="flabel">Stream Name — plain, not jargon (e.g. "Project Performance")</label><input class="finp" id="m-sname" placeholder="e.g. Commercial Strength"></div>
    <div class="frow"><label class="flabel">Stream Lead</label><input class="finp" id="m-slead" placeholder="Named person responsible"></div>
    <div class="frow"><label class="flabel">Objectives (one sentence)</label><input class="finp" id="m-sobj" placeholder="What this stream is trying to improve"></div>
    <div class="frow"><label class="flabel">Colour</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
        ${STREAM_COLORS.map((c,i)=>`<div onclick="selStreamColor('${c}')" id="sc-${i}" style="width:26px;height:26px;border-radius:50%;background:${c};cursor:pointer;border:2px solid ${i===used%STREAM_COLORS.length?"#fff":"transparent"}" data-color="${c}"></div>`).join("")}

window.showAddStream=showAddStream;

function selStreamColor(c){
  document.getElementById("m-scolor").value=c;
  document.querySelectorAll("[id^='sc-']").forEach(el=>{el.style.border=el.dataset.color===c?"2px solid #fff":"2px solid transparent";});
}
window.selStreamColor=selStreamColor;

function addStream(){
  const name=document.getElementById("m-sname").value.trim();
  const lead=document.getElementById("m-slead").value.trim();
  if(!name) return alert("Stream name required.");
  S.streams.push({id:uid(),name,lead,color:document.getElementById("m-scolor").value,objectives:document.getElementById("m-sobj").value.trim(),teamMembers:[]});
  closeModal(); saveData(); render();
}
window.addStream=addStream;

function deleteStream(id){
  if(!confirm("Remove this stream? Initiatives in it will remain but lose their stream assignment.")) return;
  S.streams=S.streams.filter(s=>s.id!==id);
  saveData(); render();
}
window.deleteStream=deleteStream;

function saveStreamEdit(id){
  const s=S.streams.find(s=>s.id===id);
  if(!s) return;
  s.name=document.getElementById("se-name").value.trim()||s.name;
  s.lead=document.getElementById("se-lead").value.trim();
  s.objectives=document.getElementById("se-obj").value.trim();
  s.color=document.getElementById("m-scolor").value;
  saveData(); go("stream-edit",id);
}
window.saveStreamEdit=saveStreamEdit;

function showAddStreamMember(streamId){
  openModal("Add Team Member",`
    <div class="frow"><label class="flabel">Full Name</label><input class="finp" id="m-mname" placeholder="e.g. Thabo Mokoena"></div>
    <div class="fgrid2">
      <div class="frow"><label class="flabel">Role</label><input class="finp" id="m-mrole" placeholder="e.g. Site Manager"></div>
      <div class="frow"><label class="flabel">Hours / Week on this stream</label><input class="finp" type="number" id="m-mhours" placeholder="e.g. 8" min="0"></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addStreamMember('${streamId}')">Add Member</button>
    </div>`);
}
window.showAddStreamMember=showAddStreamMember;

function addStreamMember(streamId){
  const s=S.streams.find(s=>s.id===streamId);
  if(!s) return;
  const name=document.getElementById("m-mname").value.trim();
  if(!name) return;
  if(!s.teamMembers) s.teamMembers=[];
  s.teamMembers.push({name,role:document.getElementById("m-mrole").value.trim(),hours:parseInt(document.getElementById("m-mhours").value)||0});
  closeModal(); saveData(); go("stream-edit",streamId);
}
window.addStreamMember=addStreamMember;

function removeStreamMember(streamId,idx){
  const s=S.streams.find(s=>s.id===streamId);
  if(!s||!s.teamMembers) return;
  s.teamMembers.splice(idx,1);
  saveData(); go("stream-edit",streamId);
}
window.removeStreamMember=removeStreamMember;

// DASHBOARD
// ══════════════════════════════════════════════════════════════════════════════
function renderDashboard(){
  const active=S.initiatives.filter(i=>i.portfolioStatus==="Active");
  const onTrack=active.filter(i=>i.rag==="On Track").length;
  const atRisk=active.filter(i=>i.rag==="At Risk").length;
  const behind=active.filter(i=>i.rag==="Behind Schedule").length;
  const onHold=active.filter(i=>i.rag==="On Hold").length;
  const totalB=active.reduce((s,i)=>s+i.benefit,0);
  const totalA=active.reduce((s,i)=>s+(i.actual||0),0);
  const openDec=S.decisions.filter(d=>d.status==="Open"||d.status==="Overdue");
  const overdueAct=S.actions.filter(a=>a.status==="Overdue"||isOverdue(a.due)&&a.status!=="Done");
  const highRisk=S.risks.filter(r=>r.level==="High"&&r.status!=="Closed");

  // Filtered view state
  const df=S._dashFilter||"All";

  return `
  <div class="prog-banner">
    <div style="font-size:9px;font-weight:700;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:5px">Active Programme</div>

    <div style="display:flex;gap:20px;flex-wrap:wrap">
      ${[["Lead",S.programme.lead||"—"],["Governance",S.programme.governanceBody||"SteerCo"],["Status",S.programme.status||"Active"],["Since",S.programme.startDate||"—"],["Update Cadence",S.programme.reportingFreq||"Weekly"]].map(([l,v])=>`
      <div><div style="font-size:9px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:2px">${l}</div><div style="font-size:11px;color:var(--muted)">${esc(v)}</div></div>`).join("")}
    </div>
  </div>

  <!-- Clickable metrics — drill down -->
  <div class="metrics">
    <div class="metric" onclick="drillDash('On Track')" style="border-top:3px solid #22C55E">
      <div class="metric-val" style="color:#22C55E">${onTrack}</div>
      <div class="metric-label">On Track</div>
      <div class="metric-sub">${pct}% of portfolio · click to drill</div>
    </div>
    <div class="metric" onclick="drillDash('At Risk')" style="border-top:3px solid #F59E0B">
      <div class="metric-val" style="color:#F59E0B">${atRisk}</div>
      <div class="metric-label">At Risk</div>
      <div class="metric-sub">Need a plan · click to drill</div>
    </div>
    <div class="metric" onclick="drillDash('Behind Schedule')" style="border-top:3px solid #EF4444">
      <div class="metric-val" style="color:#EF4444">${behind}</div>
      <div class="metric-label">Behind Schedule</div>
      <div class="metric-sub">Immediate action · click to drill</div>
    </div>
    <div class="metric" onclick="drillDash('On Hold')" style="border-top:3px solid #64748B">
      <div class="metric-val" style="color:#64748B">${onHold}</div>
      <div class="metric-label">On Hold</div>
      <div class="metric-sub">Paused by decision</div>
    </div>
    <div class="metric" onclick="go('reporting')" style="border-top:3px solid #3B7FE8">
      <div class="metric-val" style="color:#3B7FE8">${fmt(totalB)}</div>
      <div class="metric-label">Benefit Target</div>
      <div class="metric-sub">${fmt(totalA)} realised</div>

  <!-- Drilldown filter -->
  ${df!=="All"?`<div class="callout callout-warn" style="display:flex;justify-content:space-between;align-items:center">
    <span>Showing <strong>${df}</strong> initiatives only (${active.filter(i=>i.rag===df).length} of ${active.length})</span>
    <button class="btn btn-sm btn-ghost" onclick="drillDash('All')">Show all</button>
  </div>`:""}

  <div class="grid2" style="gap:14px">
    <!-- Stream Health — clickable -->
    <div class="card">
      <span class="slabel">Focus Area Health</span>
      ${S.streams.length===0?`<div class="empty">No value streams yet.<br><button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="go('setup')">Go to Setup →</button></div>`:""}
      ${S.streams.map(s=>{
        const si=active.filter(i=>i.streamId===s.id);
        const agg=ragAgg(si.map(i=>i.rag));
        const tb=si.reduce((sum,i)=>sum+i.benefit,0);
        return `<div class="flex-row card-hover" style="padding:9px 6px;border-bottom:1px solid var(--border);border-radius:4px" onclick="go('stream-detail','${s.id}')">
          <div class="stream-bar" style="height:36px;background:${s.color}"></div>

        ${openDec.length===0?`<div style="font-size:12px;color:var(--muted)">No open decisions.</div>`:""}
        ${openDec.slice(0,3).map(d=>`
        <div class="card-hover" style="border-left:2px solid ${d.status==="Overdue"?"#EF4444":"#F59E0B"};padding:8px 10px;margin-bottom:6px;border-radius:4px;background:var(--bg2)" onclick="showRecordDecision('${d.id}')">

          <div style="display:flex;gap:8px;margin-top:3px;align-items:center">${chip(d.status)}<span style="font-size:10px;color:var(--muted)">→ ${esc(d.neededFrom)} · ${esc(d.due)}</span></div>
        </div>`).join("")}
      </div>
      <div class="card">
        <div class="flex-between mb-8">
          <span class="slabel" style="margin:0">Overdue Actions</span>
          <button class="btn btn-sm btn-ghost" onclick="go('actions')">All →</button>
        </div>
        ${overdueAct.length===0?`<div style="font-size:12px;color:var(--muted)">None overdue. 👌</div>`:""}

function addInit(){
  const name=document.getElementById("m-iname").value.trim();
  const lead=document.getElementById("m-ilead").value.trim();
  if(!name||!lead) return alert("Name and lead are required.");
  const id=uid();
  S.initiatives.push({
    id, name, lead,
    streamId:document.getElementById("m-istream").value,
    weeklyHours:parseInt(document.getElementById("m-ihours").value)||0,
    benefit:parseInt(document.getElementById("m-ibenefit").value)||0,
    actual:0,
    priority:parseFloat(document.getElementById("m-ipriority").value)||3.0,
    plannedStart:document.getElementById("m-istart").value,
    plannedEnd:document.getElementById("m-iend").value,
    portfolioStatus:document.getElementById("m-iportstatus").value,
    rag:"On Track", kpis:[], milestones:[], teamMembers:[],
    businessCase:{problem:"",baseline:"",actions:"",benefit:"",opBenefit:"",cost:"",payback:"",risks:"",recommendation:""},
    statusNote:"", lastUpdated:today()
  });
  closeModal(); saveData(); go("init-detail",id);
}
window.addInit=addInit;

// INITIATIVE DETAIL (Tabs: Overview | Business Case | Activities | KPIs | Milestones | Decisions)
// ══════════════════════════════════════════════════════════════════════════════
function renderInitDetail(id){
  const init=S.initiatives.find(i=>i.id===id);
  if(!init) return `<button class="back-link" onclick="go('initiatives')">← Back</button><div class="empty">Initiative not found.</div>`;
  const stream=S.streams.find(s=>s.id===init.streamId);
  const acts=S.activities.filter(a=>a.initId===id);
  const decs=S.decisions.filter(d=>d.relatedId===id);
  const done=acts.filter(a=>a.status==="Complete").length;
  const pct=acts.length?Math.round((done/acts.length)*100):0;
  const tab=S._initTab||"overview";

  const tabContent = ()=>{
    if(tab==="overview") return renderInitOverview(init,stream,acts,done,pct,decs);
    if(tab==="bc")       return renderInitBC(init);
    if(tab==="activities") return renderInitActivities(init,stream,acts,pct);
    if(tab==="kpis")     return renderInitKPIs(init);
    if(tab==="milestones") return renderInitMilestones(init);
    if(tab==="decs")     return renderInitDecs(init,decs);
    return "";
  };

  return `
  <button class="back-link" onclick="go('initiatives')">← Back to Initiatives</button>
  <div class="flex-between" style="margin-bottom:14px;gap:12px;flex-wrap:wrap">
    <div>
      <div class="flex-row gap-6" style="margin-bottom:4px">
        <span style="width:7px;height:7px;border-radius:50%;background:${stream?.color||"#64748B"}"></span>
        <span style="font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px">${esc(stream?.name||"No stream")}</span>
      </div>
      <div class="page-title">${esc(init.name)}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:3px">Lead: ${esc(init.lead)} · ${init.weeklyHours||0}h/wk · Priority <span style="font-family:var(--mono);color:var(--accent)">${(init.priority||0).toFixed(1)}</span> · Last updated: ${esc(init.lastUpdated||"—")}</div>
    </div>
    <div class="flex-row gap-8">
      ${ragChip(init.rag)}
      <button class="btn btn-sm btn-secondary" onclick="showUpdateStatus('${id}')">Update Status</button>
      <button class="btn btn-sm btn-danger" onclick="deleteInit('${id}')">Delete</button>
    </div>
  </div>
  <div class="tabs">
    ${[["overview","Overview"],["bc","Business Case"],["activities","Activities ("+acts.length+")"],["kpis","KPIs ("+init.kpis.length+")"],["milestones","Milestones"],["decs","Decisions ("+decs.length+")"]].map(([t,l])=>`<button class="tab${tab===t?" active":""}" onclick="setIT('${t}')">${l}</button>`).join("")}
  </div>
  ${tabContent()}`;
}

function setIT(t){S._initTab=t;render();}
window.setIT=setIT;

function renderInitOverview(init,stream,acts,done,pct,decs){
  const openD=decs.filter(d=>d.status!=="Made");
  return `
  <div class="metrics">
    <div class="metric"><div class="metric-val" style="color:#3B7FE8">${acts.length}</div><div class="metric-label">Activities</div><div class="metric-sub">${done} complete</div></div>
    <div class="metric"><div class="metric-val" style="color:${stream?.color||"#3B7FE8"}">${pct}%</div><div class="metric-label">Progress</div></div>
    ${init.benefit>0?`<div class="metric"><div class="metric-val" style="color:#22C55E">${fmt(init.benefit)}</div><div class="metric-label">Benefit Target</div><div class="metric-sub">${fmt(init.actual||0)} realised</div></div>`:""}
    <div class="metric"><div class="metric-val" style="color:#F59E0B">${openD.length}</div><div class="metric-label">Open Decisions</div></div>
  </div>
  ${init.statusNote?`<div class="callout callout-info" style="margin-bottom:12px"><strong>Latest status note:</strong> ${esc(init.statusNote)}</div>`:""}
  <div class="grid2" style="gap:12px">
    <div class="card">
      <span class="slabel">Key Details</span>
      ${[["Portfolio Status",init.portfolioStatus],["Planned Start",init.plannedStart||"—"],["Planned End",init.plannedEnd||"—"],["Weekly Hours",`${init.weeklyHours||0}h`],["Financial Target",init.benefit>0?fmt(init.benefit):"Not financial"]].map(([l,v])=>`<div class="flex-between" style="padding:6px 0;border-bottom:1px solid var(--bg3)"><span style="font-size:11px;color:var(--muted)">${l}</span><span style="font-size:11px;font-weight:600;color:var(--text)">${v}</span></div>`).join("")}
    </div>
    <div class="card">
      <span class="slabel">Quick Actions</span>
      <div class="flex-col" style="gap:6px">
        <button class="btn btn-secondary" style="justify-content:flex-start" onclick="setIT('bc')">📋 ${init.businessCase?.problem?"View Business Case":"Complete Business Case"}</button>
        <button class="btn btn-secondary" style="justify-content:flex-start" onclick="setIT('activities');showAddActivity('${init.id}')">+ Add Activity</button>
        <button class="btn btn-secondary" style="justify-content:flex-start" onclick="setIT('kpis');showAddKPI('${init.id}')">+ Add KPI</button>
        <button class="btn btn-secondary" style="justify-content:flex-start" onclick="setIT('milestones');showAddMilestone('${init.id}')">+ Add Milestone</button>
        <button class="btn btn-secondary" style="justify-content:flex-start" onclick="showAddDecisionFor('${init.id}')">+ Log Decision</button>
      </div>
    </div>
  </div>`;
}

function renderInitBC(init){
  const bc=init.businessCase||{};
  return `
  <div class="callout callout-tip">The business case is the filter before an initiative enters the portfolio. If you cannot fill in the baseline and expected benefit, the initiative is not ready.</div>
  <div class="card">
    <span class="slabel">Business Case (Lite) — max 2 pages</span>
    <div class="frow"><label class="flabel">The Problem — what is broken? (2 sentences max)</label>
      <textarea class="ftxt" id="bc-problem" rows="2" placeholder="e.g. We are missing tender margins on 60% of projects. The average shortfall is 77% below tender.">${esc(bc.problem||"")}</textarea></div>
    <div class="frow"><label class="flabel">Where we are now — the baseline (use numbers)</label>
      <textarea class="ftxt" id="bc-baseline" rows="2" placeholder="e.g. Current margin variance: 77% miss rate. WIP: R290m. Forecast accuracy: 8.8–45% shortfall.">${esc(bc.baseline||"")}</textarea></div>
    <div class="frow"><label class="flabel">What we are going to do — 3 to 5 specific changes</label>
      <textarea class="ftxt" id="bc-actions" rows="3" placeholder="e.g. 1. Introduce weekly 2hr production planning meetings on all projects above R100m...">${esc(bc.actions||"")}</textarea></div>
    <div class="fgrid2">
      <div class="frow"><label class="flabel">Expected financial benefit (R and how you calculated it)</label>
        <textarea class="ftxt" id="bc-benefit" rows="2" placeholder="e.g. If margin miss reduces 10% on R500m revenue = R5m/yr. Confidence: Medium">${esc(bc.benefit||"")}</textarea></div>
      <div class="frow"><label class="flabel">Expected operational benefit (speed, risk, client experience)</label>
        <textarea class="ftxt" id="bc-opbenefit" rows="2" placeholder="e.g. Reduced escalations to CEO. Faster certification. Less rework.">${esc(bc.opBenefit||"")}</textarea></div>
      <div class="frow"><label class="flabel">What it will cost to deliver (hours + any direct spend)</label>
        <input class="finp" id="bc-cost" placeholder="e.g. 120hrs internal time + R40k consultant" value="${esc(bc.cost||"")}"></div>
      <div class="frow"><label class="flabel">Simple payback logic (benefit ÷ cost)</label>
        <input class="finp" id="bc-payback" placeholder="e.g. R5m/yr benefit vs R200k cost = payback in 3 weeks" value="${esc(bc.payback||"")}"></div>
    </div>
    <div class="frow"><label class="flabel">Top 3 risks (one line each with probability H/M/L)</label>
      <textarea class="ftxt" id="bc-risks" rows="2" placeholder="e.g. 1. Director engagement — Medium. 2. Data availability — High...">${esc(bc.risks||"")}</textarea></div>
    <div class="frow"><label class="flabel">Decision required — Approve / Do not proceed / Defer</label>
      <select class="fsel" id="bc-rec">
        ${["Approve","Do Not Proceed","Defer","Pending Review"].map(o=>`<option${bc.recommendation===o?" selected":""}>${o}</option>`).join("")}
      </select>

    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" onclick="saveBC('${init.id}')">Save Business Case</button>
      <button class="btn btn-ghost" onclick="setIT('overview')">Cancel</button>
    </div>
  </div>`;
}

function saveBC(id){
  const init=S.initiatives.find(i=>i.id===id);
  if(!init) return;
  init.businessCase={
    problem:document.getElementById("bc-problem").value.trim(),
    baseline:document.getElementById("bc-baseline").value.trim(),
    actions:document.getElementById("bc-actions").value.trim(),
    benefit:document.getElementById("bc-benefit").value.trim(),

function renderDecisions(){
  const tab=S._decTab||"Overdue";
  const groups={Overdue:S.decisions.filter(d=>d.status==="Overdue"),Open:S.decisions.filter(d=>d.status==="Open"),Made:S.decisions.filter(d=>d.status==="Made")};
  const list=groups[tab]||[];
  return `
  <div class="flex-between mb-12">
    <span class="slabel" style="margin:0">Decisions & Escalation Log</span>
    <button class="btn btn-sm btn-primary" onclick="showAddDecision()">+ Log Decision</button>
  </div>
  <div class="tabs">
    ${[["Overdue","Overdue ("+groups.Overdue.length+")"],["Open","Open ("+groups.Open.length+")"],["Made","Made ("+groups.Made.length+")"]].map(([t,l])=>`<button class="tab${tab===t?" active":""}" onclick="setDT('${t}')">${l}</button>`).join("")}
  </div>
  ${list.length===0?`<div class="empty">No ${tab.toLowerCase()} decisions.</div>`:""}
  <div class="flex-col">
    ${list.map(d=>{
      const related=S.initiatives.find(i=>i.id===d.relatedId)||S.streams.find(s=>s.id===d.relatedId);
      return `<div class="card" style="border-left:3px solid ${d.status==="Made"?"#22C55E":d.status==="Overdue"?"#EF4444":"#F59E0B"};cursor:${d.status!=="Made"?"pointer":"default"}" onclick="${d.status!=="Made"?`showRecordDecision('${d.id}')`:""}" title="${d.status!=="Made"?"Click to record decision":""}">
        <div class="flex-between" style="gap:12px;flex-wrap:wrap">
          <div style="flex:1">
            <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:5px">${esc(d.description)}</div>
            <div style="display:flex;gap:12px;font-size:10px;color:var(--muted);flex-wrap:wrap">
              <span>From: <strong style="color:var(--text)">${esc(d.neededFrom)}</strong></span>
              <span>Due: <strong style="color:${d.status==="Overdue"?"#EF4444":"var(--text)"}">${esc(d.due)}</strong></span>
              ${related?`<span>Re: <span style="color:var(--accent)">${esc(related.name)}</span></span>`:""}
              <span>Level: ${esc(d.level)}</span>
            </div>
            ${d.consequence&&!d.decision?`<div style="margin-top:7px;font-size:11px;color:#EF4444;background:var(--redD);padding:4px 8px;border-radius:4px">If not made: ${esc(d.consequence)}</div>`:""}
            ${d.decision?`<div style="margin-top:7px;font-size:11px;color:#22C55E;background:var(--greenD);padding:4px 8px;border-radius:4px">✓ ${esc(d.decision)}</div>`:""}
          </div>
          ${chip(d.status)}
        </div>
        ${d.status!=="Made"?`<div style="margin-top:10px;font-size:10px;color:var(--dim)">↑ Click anywhere to record decision</div>`:""}
      </div>`;
    }).join("")}
  </div>`;
}
function setDT(t){S._decTab=t;render();}
window.setDT=setDT;

function showAddDecision(){
  openModal("Log Decision Required",`
    <div class="frow"><label class="flabel">What decision is needed? (specific)</label>
      <textarea class="ftxt" id="m-ddesc" rows="2" placeholder="e.g. Approve production planning template before training begins"></textarea>
    </div>
    <div class="fgrid2">
      <div class="frow"><label class="flabel">Decision needed from (named person)</label><input class="finp" id="m-dfrom" placeholder="e.g. Clinton Crowie"></div>
      <div class="frow"><label class="flabel">Due by</label><input class="finp" type="date" id="m-ddue"></div>
      <div class="frow"><label class="flabel">Level</label>
        <select class="fsel" id="m-dlevel"><option>Initiative</option><option>Stream</option><option>Programme</option><option>${S.programme.governanceBody||"SteerCo"}</option></select>
      </div>
      <div class="frow"><label class="flabel">Related Initiative (optional)</label>
        <select class="fsel" id="m-drelated"><option value="">None</option>${S.initiatives.map(i=>`<option value="${i.id}">${esc(i.name)}</option>`).join("")}</select>
      </div>
    </div>
    <div class="frow"><label class="flabel">What happens if not made by the due date? (mandatory)</label>
      <input class="finp" id="m-dconseq" placeholder="e.g. Training cannot start — initiative stays Behind Schedule">
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addDecision()">Log Decision</button>
    </div>`);
}
window.showAddDecision=showAddDecision;

function showAddDecisionFor(relatedId){
  S._pendingRelatedId=relatedId;
  showAddDecision();
}
window.showAddDecisionFor=showAddDecisionFor;

function addDecision(){
  const desc=document.getElementById("m-ddesc").value.trim();
  const from=document.getElementById("m-dfrom").value.trim();
  const conseq=document.getElementById("m-dconseq").value.trim();
  if(!desc||!from||!conseq) return alert("Description, 'needed from' and consequence are all required.");
  const relId=S._pendingRelatedId||document.getElementById("m-drelated").value||null;
  S._pendingRelatedId=null;
  S.decisions.push({id:uid(),description:desc,neededFrom:from,due:document.getElementById("m-ddue").value,level:document.getElementById("m-dlevel").value,consequence:conseq,status:"Open",decision:null,relatedId:relId});
  closeModal(); saveData(); renderNav(); render();
}
window.addDecision=addDecision;

function showRecordDecision(id){
  const d=S.decisions.find(d=>d.id===id);
  if(!d) return;
  openModal("Record Decision — "+d.description.substring(0,50),`
    <div style="margin-bottom:12px;font-size:12px;color:var(--muted)">Required from: <strong style="color:var(--text)">${esc(d.neededFrom)}</strong> · Due: ${esc(d.due)}</div>
    ${d.consequence?`<div class="callout callout-warn" style="margin-bottom:12px">If not made: ${esc(d.consequence)}</div>`:""}
    <div class="frow"><label class="flabel">What was decided?</label>
      <textarea class="ftxt" id="m-rdtext" rows="3" placeholder="Record the decision exactly as made — this is a governance record"></textarea>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="recordDecision('${id}')">Save Decision</button>
    </div>`);
}
window.showRecordDecision=showRecordDecision;

function recordDecision(id){
  const text=document.getElementById("m-rdtext").value.trim();
  if(!text) return;
  const d=S.decisions.find(d=>d.id===id);
  if(d){d.status="Made";d.decision=text;d.decidedDate=today();}
  closeModal(); saveData(); renderNav(); render();
}
window.recordDecision=recordDecision;

// ACTIONS
// ══════════════════════════════════════════════════════════════════════════════
function renderActions(){
  const groups={
    Overdue:S.actions.filter(a=>a.status==="Overdue"||isOverdue(a.due)&&a.status!=="Done"),
    "In Progress":S.actions.filter(a=>a.status==="In Progress"&&!(isOverdue(a.due))),
    "Not Started":S.actions.filter(a=>a.status==="Not Started"&&!(isOverdue(a.due))),
    Done:S.actions.filter(a=>a.status==="Done"),
  };
  const gc={Overdue:"#EF4444","In Progress":"#3B7FE8","Not Started":"#64748B",Done:"#22C55E"};
  return `
  <div class="flex-between mb-12">
    <span class="slabel" style="margin:0">Actions Log</span>
    <button class="btn btn-sm btn-primary" onclick="showAddAction()">+ New Action</button>
  </div>
  ${Object.entries(groups).map(([group,acts])=>`
  <div style="margin-bottom:18px">
    <div class="flex-row gap-6" style="margin-bottom:8px">
      <span style="width:5px;height:5px;border-radius:50%;background:${gc[group]}"></span>
      <span style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim)">${group} (${acts.length})</span>
    </div>
    ${acts.length===0?`<div style="font-size:11px;color:var(--border);padding-left:12px">None.</div>`:""}
    <div class="flex-col" style="gap:6px">
      ${acts.map(a=>{
        const bc=a.status==="Done"?"#22C55E":isOverdue(a.due)&&a.status!=="Done"?"#EF4444":a.status==="In Progress"?"#3B7FE8":"#64748B";
        const related=S.initiatives.find(i=>i.id===a.relatedId)||S.streams.find(s=>s.id===a.relatedId);
        return `<div class="card" style="border-left:3px solid ${bc}">
          <div class="flex-between" style="gap:10px">
            <div style="flex:1">
              <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px">${esc(a.desc)}</div>
              <div style="font-size:10px;color:var(--muted)">
                Owner: <strong style="color:var(--text)">${esc(a.owner)}</strong> · Due: <strong style="color:${isOverdue(a.due)&&a.status!=="Done"?"#EF4444":"var(--text)"}">${esc(a.due)||"no date"}</strong>
                ${related?` · <span style="color:var(--accent)">${esc(related.name)}</span>`:""}
              </div>
            </div>
            <div class="flex-row gap-6">
              ${chip(a.status)}
              ${a.status!=="Done"?`<button class="btn btn-sm btn-green" onclick="markActionDone('${a.id}')">✓</button>`:""}
              <button class="btn btn-sm btn-danger" onclick="deleteAction('${a.id}')">×</button>
            </div>
          </div>
        </div>`;
      }).join("")}
    </div>
  </div>`).join("")}`;
}

function showAddAction(){
  openModal("New Action",`
    <div class="frow"><label class="flabel">What needs to be done? (specific)</label>
      <textarea class="ftxt" id="m-adesc" rows="2" placeholder="e.g. Distribute planning template to ops director for sign-off by Friday"></textarea>
    </div>
    <div class="fgrid2">
      <div class="frow"><label class="flabel">Owner (named person)</label><input class="finp" id="m-aowner" placeholder="Who is doing this?"></div>
      <div class="frow"><label class="flabel">Due by</label><input class="finp" type="date" id="m-aactiondue"></div>
    </div>
    <div class="frow"><label class="flabel">Status</label>
      <select class="fsel" id="m-aactionstatus"><option>Not Started</option><option>In Progress</option><option>Overdue</option></select>
    </div>
    <div class="frow"><label class="flabel">Related Initiative (optional)</label>
      <select class="fsel" id="m-arelated"><option value="">None</option>${S.initiatives.map(i=>`<option value="${i.id}">${esc(i.name)}</option>`).join("")}</select>

    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addAction()">Add Action</button>
    </div>`);
}
window.showAddAction=showAddAction;

function addAction(){
  const desc=document.getElementById("m-adesc").value.trim();
  const owner=document.getElementById("m-aowner").value.trim();
  if(!desc||!owner) return alert("Description and owner required.");
  S.actions.push({id:uid(),desc,owner,due:document.getElementById("m-aactiondue").value,status:document.getElementById("m-aactionstatus").value,relatedId:document.getElementById("m-arelated").value||null});
  closeModal(); saveData(); renderNav(); render();
}
window.addAction=addAction;

function markActionDone(id){
  const a=S.actions.find(a=>a.id===id);
  if(a){ a.status="Done"; a.doneDate=today(); }
  saveData(); renderNav(); render();
}
window.markActionDone=markActionDone;

function deleteAction(id){
  S.actions=S.actions.filter(a=>a.id!==id);
  saveData(); renderNav(); render();
}
window.deleteAction=deleteAction;

// ══════════════════════════════════════════════════════════════════════════════
function renderRisks(){
  const f=S._riskFilter||"All";
  const filtered=f==="All"?S.risks:S.risks.filter(r=>r.level===f||r.status===f);
  const high=S.risks.filter(r=>r.level==="High"&&r.status!=="Closed");
  return `
  <div class="flex-between mb-12">
    <span class="slabel" style="margin:0">Risk & Issue Register</span>
    <button class="btn btn-sm btn-primary" onclick="showAddRisk()">+ Log Risk</button>
  </div>
  ${high.length>0?`<div class="callout callout-warn" style="margin-bottom:12px">${high.length} High risk${high.length>1?"s":""} open — escalate to ${S.programme.governanceBody||"SteerCo"} if not resolved.</div>`:""}
  <div class="filter-pills">
    ${["All","High","Medium","Low","Closed"].map(f2=>`<button class="pill${f===f2?" active":""}" onclick="setRF('${f2}')">${f2}</button>`).join("")}
  </div>
  ${filtered.length===0?`<div class="empty">No risks logged.</div>`:""}
  <div class="flex-col">
    ${filtered.map(r=>{
      const related=S.initiatives.find(i=>i.id===r.relatedId);
      return `<div class="risk-card risk-${r.level?.toLowerCase()}" style="opacity:${r.status==="Closed"?.5:1}">
        <div class="flex-between" style="margin-bottom:7px">
          <div style="font-size:13px;font-weight:700;color:var(--text)">${esc(r.title)}</div>
          <div class="flex-row gap-6">${riskBadge(r.level)}${chip(r.status||"Open")}</div>
        </div>
        ${r.description?`<div style="font-size:12px;color:var(--muted);margin-bottom:6px">${esc(r.description)}</div>`:""}
        ${r.mitigation?`<div style="font-size:11px;color:var(--dim)">Mitigation: ${esc(r.mitigation)}</div>`:""}
        <div style="display:flex;gap:14px;margin-top:7px;font-size:10px;color:var(--muted)">
          <span>Owner: <strong style="color:var(--text)">${esc(r.owner)||"—"}</strong></span>
          ${related?`<span>Re: <span style="color:var(--accent)">${esc(related.name)}</span></span>`:""}
        </div>
        ${r.status!=="Closed"?`<div style="margin-top:10px"><button class="btn btn-sm btn-ghost" onclick="closeRisk('${r.id}')">Mark Closed</button></div>`:""}
      </div>`;
    }).join("")}
  </div>`;
}
function setRF(f){S._riskFilter=f;render();}
window.setRF=setRF;

function showAddRisk(){
  openModal("Log Risk",`
    <div class="frow"><label class="flabel">Risk Title (plain, specific)</label><input class="finp" id="m-rtitle" placeholder="e.g. CEO disengages after launch"></div>
    <div class="frow"><label class="flabel">Description</label><textarea class="ftxt" id="m-rdesc" rows="2" placeholder="What could happen? What's the trigger?"></textarea></div>
    <div class="fgrid2">
      <div class="frow"><label class="flabel">Probability</label>
        <select class="fsel" id="m-rlevel"><option>High</option><option>Medium</option><option>Low</option></select>
      </div>
      <div class="frow"><label class="flabel">Risk Owner</label><input class="finp" id="m-rown" placeholder="Named person"></div>
    </div>
    <div class="frow"><label class="flabel">Mitigation — what we will do if it happens</label>
      <textarea class="ftxt" id="m-rmit" rows="2" placeholder="e.g. Immediate escalation to Chairman; reframe as authority risk"></textarea>
    </div>
    <div class="frow"><label class="flabel">Related Initiative (optional)</label>
      <select class="fsel" id="m-rrelated"><option value="">None</option>${S.initiatives.map(i=>`<option value="${i.id}">${esc(i.name)}</option>`).join("")}</select>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addRisk()">Log Risk</button>
    </div>`);
}
window.showAddRisk=showAddRisk;

function addRisk(){
  const title=document.getElementById("m-rtitle").value.trim();
  if(!title) return alert("Risk title required.");
  S.risks.push({id:uid(),title,description:document.getElementById("m-rdesc").value.trim(),level:document.getElementById("m-rlevel").value,owner:document.getElementById("m-rown").value.trim(),mitigation:document.getElementById("m-rmit").value.trim(),relatedId:document.getElementById("m-rrelated").value||null,status:"Open",dateLogged:today()});
  closeModal(); saveData(); renderNav(); render();
}
window.addRisk=addRisk;

function closeRisk(id){
  const r=S.risks.find(r=>r.id===id);
  if(r) r.status="Closed";
  saveData(); renderNav(); render();
}
window.closeRisk=closeRisk;

// ══════════════════════════════════════════════════════════════════════════════
// REPORTING
// ══════════════════════════════════════════════════════════════════════════════
function renderReporting(){
  const tab=S._reportTab||"portfolio";
  const active=S.initiatives.filter(i=>i.portfolioStatus==="Active");
  const totalB=active.reduce((s,i)=>s+i.benefit,0);
  const totalA=active.reduce((s,i)=>s+(i.actual||0),0);
  return `
  <span class="slabel">Governance Body — Reporting & Analytics</span>
  <div class="tabs">
    ${[["portfolio","Portfolio Overview"],["streams","By Focus Area"],["utilisation","Resource Utilisation"],["financial","Financial Spend"],["kpireport","KPI Summary"]].map(([t,l])=>`<button class="tab${tab===t?" active":""}" onclick="setRT('${t}')">${l}</button>`).join("")}
  </div>
  ${tab==="portfolio"?renderReportPortfolio(active,totalB,totalA):""}
  ${tab==="streams"?renderReportStreams(active):""}
  ${tab==="utilisation"?renderReportUtilisation(active):""}
  ${tab==="financial"?renderReportFinancial(active,totalB,totalA):""}
  ${tab==="kpireport"?renderReportKPI(active):""}`;
}
function setRT(t){S._reportTab=t;render();}
window.setRT=setRT;

function renderReportPortfolio(active,totalB,totalA){
  const gb=S.programme.governanceBody||"SteerCo";
  const openDec=S.decisions.filter(d=>d.status!=="Made").length;
  const madeDec=S.decisions.filter(d=>d.status==="Made").length;
  const overdueAct=S.actions.filter(a=>a.status==="Overdue"||isOverdue(a.due)&&a.status!=="Done").length;
  const doneAct=S.actions.filter(a=>a.status==="Done").length;
  const allActs=S.activities;
  const actDone=allActs.filter(a=>a.status==="Complete").length;
  return `
  <div class="metrics">
    <div class="metric"><div class="metric-val" style="color:#3B7FE8">${fmt(totalB)}</div><div class="metric-label">Benefit Target</div><div class="metric-sub">across active initiatives</div></div>
    <div class="metric"><div class="metric-val" style="color:#22C55E">${fmt(totalA)}</div><div class="metric-label">Benefit Realised</div><div class="metric-sub">${totalB>0?Math.round((totalA/totalB)*100):0}% of target</div></div>
    <div class="metric"><div class="metric-val" style="color:#F59E0B">${openDec}</div><div class="metric-label">Open Decisions</div><div class="metric-sub">${madeDec} made</div></div>
    <div class="metric"><div class="metric-val" style="color:#EF4444">${overdueAct}</div><div class="metric-label">Overdue Actions</div><div class="metric-sub">${doneAct} done</div></div>
  </div>
  <div class="grid2" style="gap:12px">
    <div class="card">
      <span class="slabel">Financial & Non-Financial Performance</span>
      ${active.length===0?`<div class="empty">No active initiatives.</div>`:""}
      ${active.map(init=>{
        const pct=init.benefit>0?Math.round(((init.actual||0)/init.benefit)*100):0;
        const st=S.streams.find(s=>s.id===init.streamId);
        return `<div style="padding:9px 0;border-bottom:1px solid var(--bg3)">
          <div class="flex-between" style="margin-bottom:5px">
            <div style="font-size:12px;font-weight:700;color:var(--text)">${esc(init.name)}</div>
            ${ragChip(init.rag)}
          </div>
          ${init.benefit>0?`<div class="flex-between" style="font-size:10px;color:var(--muted);margin-bottom:3px;font-family:var(--mono)"><span>Benefit</span><span>${fmt(init.actual||0)} / ${fmt(init.benefit)}</span></div>${bar(pct,st?.color||"#3B7FE8")}`:""}
          ${init.kpis?.[0]?`<div style="font-size:10px;color:var(--dim);margin-top:4px;font-family:var(--mono)">${esc(init.kpis[0].name)}: <span style="color:var(--accent)">${esc(init.kpis[0].current)}</span> → ${esc(init.kpis[0].target)}</div>`:""}
        </div>`;
      }).join("")}
    </div>
    <div class="card">
      <span class="slabel">Decisions & Communication</span>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        ${[["Open",S.decisions.filter(d=>d.status==="Open").length,"#F59E0B","var(--amberD)"],["Overdue",S.decisions.filter(d=>d.status==="Overdue").length,"#EF4444","var(--redD)"],["Made",madeDec,"#22C55E","var(--greenD)"]].map(([l,v,c,d])=>`<div style="flex:1;background:${d};border-radius:6px;padding:10px 12px;text-align:center"><div style="font-size:20px;font-weight:800;color:${c};font-family:var(--mono)">${v}</div><div style="font-size:9px;color:${c};font-weight:700;text-transform:uppercase;letter-spacing:1px">${l}</div></div>`).join("")}
      </div>
      <span class="slabel">Programme Health</span>
      ${["On Track","At Risk","Behind Schedule","On Hold"].map(s=>{const c=RAG_COLOR[s];return `<div class="flex-between" style="padding:6px 0;border-bottom:1px solid var(--bg3)"><span style="font-size:12px;color:var(--muted)">${s}</span><span style="font-size:14px;font-weight:700;color:${c.c};font-family:var(--mono)">${active.filter(i=>i.rag===s).length}</span></div>`;}).join("")}
      <div style="margin-top:12px">
        <div class="flex-between" style="font-size:10px;color:var(--muted);margin-bottom:4px;font-family:var(--mono)"><span>Activity completion</span><span>${allActs.length?Math.round((actDone/allActs.length)*100):0}%</span></div>
        ${bar(allActs.length?(actDone/allActs.length)*100:0,"#3B7FE8",4)}
      </div>
    </div>
  </div>`;
}

function renderReportStreams(active){
  if(S.streams.length===0) return `<div class="empty">No value streams set up yet.</div>`;
  return `
  <div class="flex-col">
    ${S.streams.map(s=>{
      const si=active.filter(i=>i.streamId===s.id);
      const sActs=si.flatMap(i=>S.activities.filter(a=>a.initId===i.id));
      const sDone=sActs.filter(a=>a.status==="Complete").length;
      const sPct=sActs.length?Math.round((sDone/sActs.length)*100):0;
      const agg=ragAgg(si.map(i=>i.rag));
      const tb=si.reduce((sum,i)=>sum+i.benefit,0);
      const ta=si.reduce((sum,i)=>sum+(i.actual||0),0);
      return `<div class="card">
        <div class="flex-between" style="margin-bottom:10px">
          <div style="border-left:3px solid ${s.color};padding-left:10px">
            <div style="font-size:14px;font-weight:700;color:var(--text);font-family:var(--display)">${esc(s.name)}</div>
            <div style="font-size:10px;color:var(--muted)">Lead: ${esc(s.lead)} · ${si.length} initiatives</div>
          </div>
          <div class="flex-row gap-8">${ragChip(agg)}<span style="font-size:12px;color:var(--muted);font-family:var(--mono)">${sPct}%</span></div>
        </div>
        ${bar(sPct,s.color,4)}
        ${tb>0?`<div style="font-size:10px;color:var(--muted);margin-top:8px;font-family:var(--mono)">Benefit: ${fmt(ta)} realised / ${fmt(tb)} target (${Math.round((ta/tb)*100)}%)</div>`:""}
        <div style="margin-top:12px">
          <table><thead><tr><th>Initiative</th><th>Status</th><th>Lead</th><th>Benefit</th><th>Activities</th></tr></thead>
          <tbody>${si.map(i=>{const acts=S.activities.filter(a=>a.initId===i.id);return `<tr class="clickable" onclick="go('init-detail','${i.id}')"><td style="font-weight:600;color:var(--text)">${esc(i.name)}</td><td>${ragChip(i.rag)}</td><td style="color:var(--muted)">${esc(i.lead)}</td><td style="font-family:var(--mono);color:var(--muted)">${i.benefit>0?fmt(i.benefit):"—"}</td><td style="color:var(--muted)">${acts.filter(a=>a.status==="Complete").length}/${acts.length}</td></tr>`;}).join("")}</tbody>
          </table>
        </div>
      </div>`;
    }).join("")}
  </div>`;
}

function renderReportUtilisation(active){
  // Aggregate hours per person across stream team members + initiative leads + activity leads
  const personMap={};
  const add=(name,hours,src)=>{
    if(!name) return;
    if(!personMap[name]) personMap[name]={hours:0,sources:[]};
    personMap[name].hours+=hours||0;
    if(src&&!personMap[name].sources.includes(src)) personMap[name].sources.push(src);
  };
  // Stream team members
  S.streams.forEach(s=>(s.teamMembers||[]).forEach(m=>add(m.name,m.hours,s.name)));
  // Initiative leads (assume weeklyHours)
  active.forEach(i=>add(i.lead,i.weeklyHours,i.name));
  // Activity leads (assume 3hrs/wk per activity)
  S.activities.forEach(a=>{if(a.lead&&a.status!=="Complete")add(a.lead,3,S.initiatives.find(i=>i.id===a.initId)?.name);});

  const people=Object.entries(personMap).sort((a,b)=>b[1].hours-a[1].hours);
  const maxH=people.length?people[0][1].hours:1;
  const totalH=active.reduce((s,i)=>s+i.weeklyHours,0);

  return `
  <div class="metrics">
    <div class="metric"><div class="metric-val" style="color:#3B7FE8">${totalH}</div><div class="metric-label">Total Weekly Hours</div><div class="metric-sub">committed to active initiatives</div></div>
    <div class="metric"><div class="metric-val" style="color:#A78BFA">${people.length}</div><div class="metric-label">People Identified</div><div class="metric-sub">across streams and initiatives</div></div>
    <div class="metric"><div class="metric-val" style="color:#F59E0B">${people.filter(([,v])=>v.hours>=20).length}</div><div class="metric-label">Potential Overload</div><div class="metric-sub">20+ hours / week</div></div>
  </div>
  <div class="card">
    <span class="slabel">Resource Utilisation — Top Contributors (80/20)</span>
    ${people.length===0?`<div class="empty">No resource data yet. Add team members to streams and activity leads to see utilisation.</div>`:""}
    ${people.slice(0,15).map(([name,data])=>{
      const pct=Math.round((data.hours/maxH)*100);
      const overload=data.hours>=20;
      return `<div style="margin-bottom:12px">
        <div class="flex-between" style="margin-bottom:4px">
          <div class="flex-row gap-8">
            <div style="width:28px;height:28px;border-radius:50%;background:${overload?"var(--redD)":"var(--accentD)"};color:${overload?"var(--red)":"var(--accent)"};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">${name.charAt(0).toUpperCase()}</div>
            <div><div style="font-size:12px;font-weight:600;color:var(--text)">${esc(name)}</div><div style="font-size:10px;color:var(--muted)">${data.sources.slice(0,2).map(esc).join(" · ")}</div></div>
          </div>
          <span style="font-size:13px;font-weight:700;font-family:var(--mono);color:${overload?"var(--red)":"var(--muted)"}">${data.hours}h/wk${overload?" ⚠":""}</span>
        </div>
        ${bar(pct,overload?"#EF4444":"#3B7FE8",5)}
      </div>`;
    }).join("")}
  </div>`;
}

function renderReportFinancial(active,totalB,totalA){
  const totalHours=active.reduce((s,i)=>s+i.weeklyHours,0);
  return `
  <div class="metrics">
    <div class="metric"><div class="metric-val" style="color:#3B7FE8">${fmt(totalB)}</div><div class="metric-label">Total Budget Committed</div></div>
    <div class="metric"><div class="metric-val" style="color:#22C55E">${fmt(totalA)}</div><div class="metric-label">Benefit Realised</div></div>
    <div class="metric"><div class="metric-val" style="color:#14B8A6">${totalHours}</div><div class="metric-label">Hrs/Wk Committed</div></div>
  </div>
  <div class="card mb-12">
    <span class="slabel">Initiative Financial Tracker</span>
    ${active.length===0?`<div class="empty">No active initiatives.</div>`:""}
    <table>
      <thead><tr><th>Initiative</th><th>Budget</th><th>Realised</th><th>% Achieved</th><th>Hours/wk</th><th>Status</th></tr></thead>
      <tbody>
        ${active.map(init=>{
          const pct=init.benefit>0?Math.round(((init.actual||0)/init.benefit)*100):0;
          return `<tr class="clickable" onclick="go('init-detail','${init.id}')">
            <td style="font-weight:600;color:var(--text)">${esc(init.name)}</td>
            <td style="font-family:var(--mono);color:var(--muted)">${init.benefit>0?fmt(init.benefit):"—"}</td>
            <td style="font-family:var(--mono);color:#22C55E">${fmt(init.actual||0)}</td>
            <td><div style="display:flex;align-items:center;gap:8px"><span style="font-family:var(--mono);font-size:11px;color:var(--muted)">${pct}%</span>${bar(pct,"#22C55E",3)}</div></td>
            <td style="font-family:var(--mono);color:var(--muted)">${init.weeklyHours||0}h</td>
            <td>${ragChip(init.rag)}</td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>
  </div>`;
}

function renderReportKPI(active){
  const allKPIs=active.flatMap(i=>i.kpis.map(k=>({...k,initName:i.name,initId:i.id,rag:i.rag})));
  return `
  <div class="card">
    <span class="slabel">KPI Summary — All Initiatives</span>
    ${allKPIs.length===0?`<div class="empty">No KPIs logged yet. Add KPIs to your initiatives.</div>`:""}
    ${allKPIs.map(k=>{
      return `<div style="padding:10px 0;border-bottom:1px solid var(--bg3)">
        <div class="flex-between" style="margin-bottom:5px">
          <div>
            <div style="font-size:12px;font-weight:700;color:var(--text)">${esc(k.name)}</div>
            <div style="font-size:10px;color:var(--muted)">Initiative: <span class="card-hover" style="color:var(--accent);cursor:pointer" onclick="go('init-detail','${k.initId}')">${esc(k.initName)}</span></div>
          </div>
          <div class="flex-row gap-6">${chip(k.type,"#3B7FE8","#1E3D6E")}${ragChip(k.rag)}</div>
        </div>
        <div style="display:flex;gap:20px;font-size:11px;font-family:var(--mono)">
          <div><span style="color:var(--dim)">BASE </span><span style="color:var(--muted)">${esc(k.baseline)}</span></div>
          <div><span style="color:var(--dim)">TARGET </span><span style="color:var(--muted)">${esc(k.target)}</span></div>
          <div><span style="color:var(--dim)">NOW </span><span style="color:var(--accent);font-weight:700">${esc(k.current)}</span></div>
        </div>
      </div>`;
    }).join("")}
  </div>`;
}
