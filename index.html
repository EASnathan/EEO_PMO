<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EAS PMO Platform v4</title>
<style>
/* ── CR-01/02: COPPER SIGNAL PALETTE + ARIAL FONT ── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Approved palette: Strategic Command Centre – Copper Signal Palette */
  --bg:#F8FAFC;           /* Light Neutral — page background */
  --shell:#111827;        /* Midnight Blue — sidebar/nav */
  --shellBorder:#1F2937;  /* Sidebar border */
  --shellMuted:#6B7280;   /* Sidebar muted text */
  --shellDim:#374151;     /* Sidebar dim */
  --panel:#FFFFFF;        /* Content panels */
  --panelAlt:#F1F5F9;     /* Alternating panel */
  --border:#E2E8F0;       /* Panel borders */
  --borderStrong:#CBD5E1; /* Stronger border */
  --text:#1F2937;         /* Primary text — Dark Slate */
  --muted:#6B7280;        /* Secondary text — Medium Grey */
  --dim:#94A3B8;          /* Tertiary/dim text */
  --copper:#EA580C;       /* PRIMARY ACTION — Copper */
  --copperD:#C2410C;      /* Copper hover */
  --copperL:#FFF7ED;      /* Copper light bg */
  --copperBorder:#FED7AA; /* Copper border */
  --indigo:#6366F1;       /* Navigation highlight */
  --indigoD:#4F46E5;      /* Indigo dark */
  --indigoL:#EEF2FF;      /* Indigo light */
  --indigoBorder:#C7D2FE; /* Indigo border */
  --green:#10B981;        /* Success/Completed — Emerald */
  --greenD:#065F46;       /* Green dark */
  --greenL:#ECFDF5;       /* Green light */
  --greenBorder:#A7F3D0;  /* Green border */
  --amber:#F59E0B;        /* Warning/Attention */
  --amberD:#92400E;       /* Amber dark */
  --amberL:#FFFBEB;       /* Amber light */
  --amberBorder:#FDE68A;  /* Amber border */
  --red:#EF4444;          /* Critical/Escalation */
  --redD:#7F1D1D;         /* Red dark */
  --redL:#FEF2F2;         /* Red light */
  --redBorder:#FECACA;    /* Red border */
  --blue:#3B82F6;         /* Info/Neutral */
  --blueL:#EFF6FF;        /* Blue light */
  --grey:#9CA3AF;         /* Planned/neutral status */
  --greyL:#F9FAFB;        /* Grey light */
  --font:Arial,Helvetica,sans-serif;
  --mono:'Courier New',monospace;
}
/* CR-02: Arial, min 13px, dark text on white */
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh;display:flex;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--borderStrong)}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fade{animation:fadeIn .15s ease forwards}
.pulse{animation:pulse 2s ease infinite}

/* ── SIDEBAR — Midnight Blue shell ── */
#sidebar{width:230px;background:var(--shell);display:flex;flex-direction:column;flex-shrink:0;min-height:100vh;position:sticky;top:0;height:100vh;overflow:hidden;border-right:1px solid var(--shellBorder)}
.sb-logo{padding:18px 18px 14px;border-bottom:1px solid var(--shellBorder)}
.sb-brand{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--shellMuted);text-transform:uppercase;margin-bottom:4px}
.sb-title{font-size:16px;font-weight:700;color:#F9FAFB}
.sb-live{display:flex;align-items:center;gap:6px;margin-top:6px}
.sb-prog{padding:10px 18px 9px;border-bottom:1px solid var(--shellBorder)}
.sb-prog-label{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--shellMuted);text-transform:uppercase;margin-bottom:3px}
.sb-prog-val{font-size:12px;color:#E5E7EB;font-weight:600;line-height:1.4}
nav{flex:1;padding:8px;overflow-y:auto}
.nav-section{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--shellMuted);padding:12px 10px 4px;display:block;opacity:.7}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:8px 10px;border-radius:5px;border:none;background:transparent;color:var(--shellMuted);font-size:13px;font-weight:400;cursor:pointer;margin-bottom:1px;text-align:left;transition:all .1s;font-family:var(--font);border-left:3px solid transparent}
.nav-btn:hover{background:rgba(255,255,255,.08);color:#F9FAFB}
/* CR-01: Indigo for active navigation */
.nav-btn.active{background:rgba(99,102,241,.15);color:#A5B4FC;font-weight:700;border-left-color:var(--indigo)}
.nav-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{background:var(--amber);color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700;margin-left:auto}
.nav-badge.red{background:var(--red)}
.sb-footer{padding:9px 18px;border-top:1px solid var(--shellBorder);font-size:10px;color:var(--shellMuted);display:flex;justify-content:space-between;align-items:center}
.sb-clear{background:none;border:none;color:var(--shellMuted);font-size:10px;cursor:pointer;font-family:var(--font);padding:2px 6px;border-radius:3px;transition:color .1s}
.sb-clear:hover{color:var(--red);background:rgba(239,68,68,.1)}

/* ── MAIN CONTENT ── */
#main{flex:1;overflow:auto;background:var(--bg)}
#content{max-width:1100px;margin:0 auto;padding:28px 28px 60px}

/* ── CARDS — white panels on light bg ── */
.card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:18px 20px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-hover{cursor:pointer;transition:all .1s}
.card-hover:hover{border-color:var(--borderStrong);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card-sm{padding:12px 14px}

/* ── TYPOGRAPHY — Arial, sized, contrasted ── */
.slabel{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:block}
.page-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px}

/* ── STATUS CHIPS ── */
.chip{display:inline-flex;align-items:center;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600;white-space:nowrap}
.rag-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px 3px 8px;border-radius:12px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer}
.rag-chip:hover{opacity:.8}
.rag-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── METRICS — clickable cards ── */
.metrics{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.metric{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px 16px;flex:1;min-width:120px;cursor:pointer;transition:all .12s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.metric:hover{border-color:var(--copper);box-shadow:0 2px 8px rgba(234,88,12,.12);transform:translateY(-1px)}
.metric-val{font-size:26px;font-weight:700;font-family:var(--mono);letter-spacing:-1px;line-height:1}
.metric-label{font-size:12px;font-weight:600;color:var(--text);margin-top:4px}
.metric-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* ── PROGRESS BAR ── */
.bar-track{background:var(--border);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .4s ease}

/* ── TABLES ── */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;color:var(--muted);font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;border-bottom:2px solid var(--border);background:var(--greyL)}
td{padding:10px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr.clickable{cursor:pointer}
tr.clickable:hover td{background:var(--panelAlt)}

/* ── FORMS ── */
.flabel{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:block}
.frow{margin-bottom:14px}
.finp,.fsel,.ftxt{width:100%;background:var(--panel);border:1px solid var(--borderStrong);border-radius:6px;padding:9px 12px;color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border-color .1s}
.ftxt{resize:vertical;line-height:1.5}
.finp:focus,.fsel:focus,.ftxt:focus{border-color:var(--indigo);box-shadow:0 0 0 3px var(--indigoL)}
/* CR-04: block 'e' on number inputs via CSS visual hint */
.finp[type=number]{-moz-appearance:textfield}
.finp[type=number]::-webkit-inner-spin-button{opacity:.4}
.fgrid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* ── BUTTONS — Copper primary ── */
.btn{padding:8px 18px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .12s;border:1px solid;display:inline-flex;align-items:center;gap:6px}
/* CR-01: Copper = primary action */
.btn-primary{background:var(--copper);color:#fff;border-color:var(--copper)}
.btn-primary:hover{background:var(--copperD);border-color:var(--copperD)}
/* CR-01: Indigo = secondary */
.btn-secondary{background:var(--indigoL);color:var(--indigoD);border-color:var(--indigoBorder)}
.btn-secondary:hover{background:var(--indigo);color:#fff;border-color:var(--indigo)}
.btn-ghost{background:transparent;color:var(--muted);border-color:var(--border)}
.btn-ghost:hover{background:var(--panelAlt);color:var(--text)}
.btn-danger{background:var(--redL);color:var(--red);border-color:var(--redBorder)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-green{background:var(--greenL);color:var(--greenD);border-color:var(--greenBorder)}
.btn-green:hover{background:var(--green);color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(17,24,39,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:12px;width:100%;max-width:680px;max-height:92vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 22px;border-bottom:2px solid var(--border);position:sticky;top:0;background:var(--panel);z-index:1}
.modal-title{font-size:15px;font-weight:700;color:var(--text)}
.modal-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 4px;border-radius:4px;transition:all .1s}
.modal-close:hover{background:var(--redL);color:var(--red)}
.modal-body{padding:20px 22px}
.modal-section{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--indigo);margin:18px 0 10px;border-bottom:2px solid var(--indigoBorder);padding-bottom:5px}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);margin:14px 0}

/* ── LAYOUT ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.flex-row{display:flex;align-items:center;gap:10px}
.flex-between{display:flex;justify-content:space-between;align-items:center;gap:8px}
.flex-col{display:flex;flex-direction:column;gap:8px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}.mb-20{margin-bottom:20px}
.back-link{background:none;border:none;color:var(--indigo);font-size:12px;font-weight:700;cursor:pointer;padding:0;margin-bottom:16px;font-family:var(--font);display:inline-flex;align-items:center;gap:4px}
.back-link:hover{text-decoration:underline}
.empty{font-size:13px;color:var(--muted);padding:24px;text-align:center;border:2px dashed var(--border);border-radius:8px;line-height:1.7;background:var(--greyL)}
.stream-bar{width:4px;border-radius:2px;flex-shrink:0}
.filter-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.pill{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:var(--panel);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .1s}
.pill:hover{border-color:var(--indigo);color:var(--indigoD)}
.pill.active{background:var(--indigoL);color:var(--indigoD);border-color:var(--indigoBorder)}

/* ── PROGRAMME BANNER ── */
.prog-banner{background:var(--shell);color:#F9FAFB;border-radius:10px;padding:20px 24px;margin-bottom:20px;position:relative;overflow:hidden}
.prog-banner::after{content:'';position:absolute;top:0;right:0;width:200px;height:100%;background:linear-gradient(90deg,transparent,rgba(99,102,241,.15));pointer-events:none}

/* ── CALLOUTS ── */
.callout{border-radius:6px;padding:10px 14px;font-size:13px;line-height:1.6;margin-bottom:12px;border-left:4px solid}
.callout-info{background:var(--indigoL);border-color:var(--indigo);color:var(--indigoD)}
.callout-warn{background:var(--amberL);border-color:var(--amber);color:var(--amberD)}
.callout-tip{background:var(--greyL);border-color:var(--border);color:var(--muted)}
.callout-success{background:var(--greenL);border-color:var(--green);color:var(--greenD)}

/* ── TABS ── */
.tabs{display:flex;gap:2px;margin-bottom:18px;background:var(--greyL);border-radius:8px;padding:3px;border:1px solid var(--border)}
.tab{padding:7px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .1s;border:none;background:transparent;font-family:var(--font)}
.tab.active{background:var(--panel);color:var(--text);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.08);border:1px solid var(--border)}

/* ── RISK CARDS ── */
.risk-card{border-left:4px solid;border-radius:6px;padding:12px 14px;margin-bottom:8px;background:var(--panel);border:1px solid var(--border);border-left-width:4px}
.risk-High{border-left-color:var(--copper)}
.risk-Moderate{border-left-color:var(--amber)}
.risk-Low{border-left-color:var(--green)}
.risk-Critical{border-left-color:var(--red)}

/* ── AGENDA ITEMS ── */
.agenda-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.agenda-num{width:24px;height:24px;border-radius:50%;background:var(--copper);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:var(--mono)}

/* ── SAVE TOAST ── */
#save-toast{position:fixed;bottom:20px;right:20px;background:var(--greenL);border:1px solid var(--greenBorder);color:var(--greenD);padding:9px 18px;border-radius:8px;font-size:12px;font-weight:700;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.1)}

/* ── CR-03: Quick start guide collapsed ── */
.qs-toggle{background:var(--greyL);border:1px solid var(--border);border-radius:6px;padding:8px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;color:var(--muted);transition:all .1s;margin-bottom:8px}
.qs-toggle:hover{border-color:var(--indigo);color:var(--text)}
.qs-body{display:none;font-size:13px;color:var(--muted);line-height:1.8;padding:12px 14px;background:var(--greyL);border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px}
.qs-body.open{display:block}

/* ── PRINT STYLES — CR-22 ── */
@media print{
  #sidebar,#save-toast,.btn,.back-link,.filter-pills,.tabs,.no-print{display:none!important}
  #main{overflow:visible}
  #content{max-width:100%;padding:0;margin:0}
  body{background:white;font-size:12pt}
  .card{box-shadow:none;border:1px solid #ddd;break-inside:avoid;margin-bottom:12px}
  .prog-banner{background:#111827!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  table{font-size:10pt}
  th,td{padding:6px 8px}
  .metric{min-width:80px}
  .print-section{page-break-before:always}
}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .grid2,.grid3,.fgrid2,.fgrid3{grid-template-columns:1fr}
  #sidebar{display:none}
  #content{padding:16px}
}
</style>
</head>
<body>

<div id="sidebar">
  <div class="sb-logo">
    <div class="sb-brand">Envision Advisory Services</div>
    <div class="sb-title">EAS PMO Platform</div>
    <div class="sb-live">
      <span class="pulse" style="width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block"></span>
      <span style="font-size:10px;color:var(--green);font-weight:600">LIVE · AUTO-SAVED</span>
    </div>
  </div>
  <div class="sb-prog">
    <div class="sb-prog-label">Programme</div>
    <div id="sb-prog-name" class="sb-prog-val">No programme set</div>
  </div>
  <nav id="nav"></nav>
  <div class="sb-footer">
    <span style="font-size:10px">EAS-PMO v4.0</span>
    <button class="sb-clear" onclick="clearAllData()">⊗ Reset</button>
  </div>
</div>

<div id="main">
  <div id="content" class="fade"></div>
</div>

<div id="modal-overlay" class="overlay" style="display:none" onclick="closeModalOverlay(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div id="save-toast">✓ Data saved</div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════════════════
const S = {
  programme:{ name:"", client:"", governanceBody:"SteerCo", lead:"", status:"Active", startDate:"", reportingFreq:"Weekly" },
  teamMembers:[], // CR-08: programme-level master list
  streams:[], initiatives:[], activities:[], decisions:[], actions:[], risks:[], meetings:[],
  view:"setup", param:null,
  _initFilter:"All", _decTab:"Open", _reportTab:"portfolio", _meetTab:"steerco", _dashFilter:"All", _actFilter:"All", _initTab:"overview", _riskFilter:"All",
};

// ══════════════════════════════════════════════════════════════════════════════
// PERSISTENCE — localStorage (STORE_KEY updated to v4 to avoid v3 conflicts)
// ══════════════════════════════════════════════════════════════════════════════
const STORE_KEY='eas-pmo-v4';
function saveData(){
  try{
    localStorage.setItem(STORE_KEY,JSON.stringify({
      programme:S.programme, teamMembers:S.teamMembers,
      streams:S.streams, initiatives:S.initiatives, activities:S.activities,
      decisions:S.decisions, actions:S.actions, risks:S.risks, meetings:S.meetings
    }));
    showToast();
  }catch(e){console.warn('Save failed',e);}
}
function loadData(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    if(!raw) return;
    const d=JSON.parse(raw);
    if(d.programme) Object.assign(S.programme,d.programme);
    if(d.teamMembers) S.teamMembers=d.teamMembers;
    if(d.streams) S.streams=d.streams;
    if(d.initiatives) S.initiatives=d.initiatives;
    if(d.activities) S.activities=d.activities;
    if(d.decisions) S.decisions=d.decisions;
    if(d.actions) S.actions=d.actions;
    if(d.risks) S.risks=d.risks;
    if(d.meetings) S.meetings=d.meetings;
    // Migrate
    S.initiatives.forEach(i=>{
      if(!i.kpis) i.kpis=[];
      if(!i.milestones) i.milestones=[];
      if(!i.benefitLog) i.benefitLog=[]; // CR-14
      if(!i.businessCase) i.businessCase={problem:"",baseline:"",actions:"",benefit:"",opBenefit:"",cost:"",payback:"",risks:"",recommendation:""};
      if(!i.weeklyUpdates) i.weeklyUpdates=[]; // CR-17
    });
    S.streams.forEach(s=>{if(!s.teamMembers)s.teamMembers=[];if(!s.objectives)s.objectives="";});
    S.decisions.forEach(d=>{if(!d.decisionDate)d.decisionDate="";});
    S.actions.forEach(a=>{if(!a.sourceMeeting)a.sourceMeeting="";});
  }catch(e){console.warn('Load failed',e);}
}
function clearAllData(){
  if(!confirm('Clear ALL programme data and start fresh? This cannot be undone.')) return;
  localStorage.removeItem(STORE_KEY); location.reload();
}
window.clearAllData=clearAllData;

let _tt;
function showToast(){
  const t=document.getElementById('save-toast');
  t.style.opacity='1'; clearTimeout(_tt);
  _tt=setTimeout(()=>{t.style.opacity='0';},1800);
}

// ══════════════════════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════════════════════
const uid=()=>`x${Date.now()}${Math.random().toString(36).slice(2,6)}`;
const fmt=n=>n>=1e6?`R${(n/1e6).toFixed(1)}m`:n>=1000?`R${(n/1000).toFixed(0)}k`:`R${n||0}`;
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const today=()=>new Date().toISOString().split("T")[0];
// CR-10: DD/MM/YYYY date format
const fmtDate=d=>{if(!d||d==="—")return"—";const p=d.split("-");return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d;};
const isOverdue=due=>due&&due<today();

// CR-08: get all team members across programme + streams
function allPeople(){
  const pm=new Map();
  S.teamMembers.forEach(m=>pm.set(m.name,m));
  S.streams.forEach(s=>(s.teamMembers||[]).forEach(m=>pm.set(m.name,m)));
  return [...pm.values()].sort((a,b)=>a.name.localeCompare(b.name));
}

// CR-16: weighted progress roll-up (activity 60% + milestone 40%)
function calcInitProgress(init){
  const acts=S.activities.filter(a=>a.initId===init.id);
  const actPct=acts.length?Math.round((acts.filter(a=>a.status==="Complete").length/acts.length)*100):0;
  const ms=init.milestones||[];
  if(!ms.length) return actPct;
  const msDone=ms.filter(m=>m.status==="Complete").length;
  const msOverdue=ms.filter(m=>isOverdue(m.date)&&m.status!=="Complete").length;
  // Milestone score: completed gets full credit, overdue ones penalise
  const msScore=Math.max(0,Math.round(((msDone/ms.length)*100)-((msOverdue/ms.length)*20)));
  return Math.round(actPct*0.6 + msScore*0.4);
}

const ragAgg=rags=>{
  if(!rags.length) return "On Track";
  if(rags.includes("Behind Schedule")) return "Behind Schedule";
  if(rags.includes("At Risk")) return "At Risk";
  if(rags.every(r=>r==="On Hold")) return "On Hold";
  return "On Track";
};

function renderNav(){

  const badges={decisions:openDec,actions:overdueAct,risks:highRisk};
  document.getElementById("nav").innerHTML=NAV.map(item=>{
    if(item.section) return `<span class="nav-section">${item.section}</span>`;
    const active=S.view===item.id||(item.id==="streams"&&(S.view==="stream-detail"||S.view==="stream-edit"))||(item.id==="initiatives"&&S.view==="init-detail");

          <div class="flex-between"><div style="font-size:13px;font-weight:600">${esc(i.name)}</div>${ragChip(i.rag)}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:3px">Lead: ${esc(i.lead)}</div>
        </div>`).join("")}

      <button class="btn btn-secondary btn-sm" style="margin-top:12px" onclick="showAddInit('${id}')">+ Add Initiative →</button>

  </div>`;
}

function saveStreamEdit(id){
  const s=S.streams.find(s=>s.id===id);
  if(!s) return;
  s.name=document.getElementById("se-name").value.trim()||s.name;
  s.lead=getPersonVal("se-lead");
  s.objectives=document.getElementById("se-obj").value.trim();
  s.color=document.getElementById("m-scolor").value;
  saveData(); go("stream-edit",id);
}
window.saveStreamEdit=saveStreamEdit;

function showAddStreamMember(streamId){
  openModal("Add Team Member to Stream",`
    <div class="frow"><label class="flabel">Person</label>${personSelect("m-smember")}</div>
    <div class="frow"><label class="flabel">Hours / Week on this stream</label><input class="finp" type="number" id="m-smhours" placeholder="e.g. 8" min="0" onkeydown="blockExpInput(event)"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addStreamMember('${streamId}')">Add</button>
    </div>`);
}
window.showAddStreamMember=showAddStreamMember;

function addStreamMember(streamId){
  const s=S.streams.find(s=>s.id===streamId);
  if(!s) return;
  const name=getPersonVal("m-smember");
  if(!name) return alert("Please select a person.");
  const person=allPeople().find(p=>p.name===name)||{name,role:""};
  if(!s.teamMembers) s.teamMembers=[];
  s.teamMembers.push({name:person.name,role:person.role||"",hours:parseInt(document.getElementById("m-smhours").value)||0});
  closeModal(); saveData(); go("stream-edit",streamId);
}
window.addStreamMember=addStreamMember;

function removeStreamMember(streamId,idx){
  const s=S.streams.find(s=>s.id===streamId);
  if(!s||!s.teamMembers) return;
  if(!confirm(`Remove ${s.teamMembers[idx]?.name} from this stream?`)) return;
  s.teamMembers.splice(idx,1); saveData(); go("stream-edit",streamId);
}
window.removeStreamMember=removeStreamMember;

// ══════════════════════════════════════════════════════════════════════════════
// DASHBOARD — CR-15 milestones surfaced, CR-16 weighted progress
// ══════════════════════════════════════════════════════════════════════════════
function renderDashboard(){
  const active=S.initiatives.filter(i=>i.portfolioStatus==="Active");
  const onTrack=active.filter(i=>i.rag==="On Track").length;
  const atRisk=active.filter(i=>i.rag==="At Risk").length;
  const behind=active.filter(i=>i.rag==="Behind Schedule").length;
  const onHold=active.filter(i=>i.rag==="On Hold").length;
  const totalB=active.reduce((s,i)=>s+i.benefit,0);
  const totalA=active.reduce((s,i)=>s+(i.benefitLog||[]).reduce((t,e)=>t+e.amount,0),0); // CR-14
  const openDec=S.decisions.filter(d=>d.status==="Open"||d.status==="Overdue");
  const overdueAct=S.actions.filter(a=>isOverdue(a.due)&&a.status!=="Done");
  const highRisk=S.risks.filter(r=>r.level==="High"&&r.status!=="Closed");
  const df=S._dashFilter||"All";
  const pct=active.length?Math.round((onTrack/active.length)*100):0;
  // CR-15: upcoming milestones (next 14 days)
  const soon=new Date(); soon.setDate(soon.getDate()+14);
  const soonStr=soon.toISOString().split("T")[0];
  const upcomingMS=active.flatMap(i=>(i.milestones||[]).filter(m=>m.date>=today()&&m.date<=soonStr&&m.status!=="Complete").map(m=>({...m,initName:i.name,initId:i.id})));
  const totalMS=active.reduce((t,i)=>(i.milestones||[]).length+t,0);
  const doneMS=active.reduce((t,i)=>(i.milestones||[]).filter(m=>m.status==="Complete").length+t,0);
  const msAdherence=totalMS?Math.round((doneMS/totalMS)*100):null;

  return `
  <div class="prog-banner">
    <div style="font-size:10px;font-weight:700;letter-spacing:2px;color:#9CA3AF;text-transform:uppercase;margin-bottom:6px">Active Programme</div>
    <div style="font-size:22px;font-weight:700;color:#F9FAFB;margin-bottom:12px">${esc(S.programme.name||"No programme name set")}</div>
    <div style="display:flex;gap:24px;flex-wrap:wrap">
      ${[["Lead",S.programme.lead||"—"],["Governance",S.programme.governanceBody||"SteerCo"],["Status",S.programme.status||"Active"],["Since",fmtDate(S.programme.startDate)||"—"],["Cadence",S.programme.reportingFreq||"Weekly"]].map(([l,v])=>`
      <div><div style="font-size:9px;color:#9CA3AF;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">${l}</div><div style="font-size:12px;color:#E5E7EB">${esc(v)}</div></div>`).join("")}
    </div>
  </div>

  <!-- Clickable metrics — CR-01 Copper action colour on hover -->
  <div class="metrics">
    <div class="metric" onclick="drillDash('On Track')" style="border-top:3px solid #10B981">
      <div class="metric-val" style="color:#10B981">${onTrack}</div>
      <div class="metric-label">On Track</div><div class="metric-sub">${pct}% of portfolio</div>
    </div>
    <div class="metric" onclick="drillDash('At Risk')" style="border-top:3px solid #F59E0B">
      <div class="metric-val" style="color:#F59E0B">${atRisk}</div>
      <div class="metric-label">At Risk</div><div class="metric-sub">Mitigation needed</div>
    </div>
    <div class="metric" onclick="drillDash('Behind Schedule')" style="border-top:3px solid #EF4444">
      <div class="metric-val" style="color:#EF4444">${behind}</div>
      <div class="metric-label">Behind Schedule</div><div class="metric-sub">Immediate action</div>
    </div>
    <div class="metric" onclick="drillDash('On Hold')" style="border-top:3px solid #9CA3AF">
      <div class="metric-val" style="color:#9CA3AF">${onHold}</div>
      <div class="metric-label">On Hold</div><div class="metric-sub">Paused by decision</div>
    </div>
    <div class="metric" onclick="go('reporting')" style="border-top:3px solid #EA580C">
      <div class="metric-val" style="color:#EA580C">${fmt(totalB)}</div>
      <div class="metric-label">Benefit Target</div><div class="metric-sub">${fmt(totalA)} realised</div>
    </div>
    <div class="metric" onclick="go('decisions')" style="border-top:3px solid #F59E0B">
      <div class="metric-val" style="color:#F59E0B">${openDec.length}</div>
      <div class="metric-label">Open Decisions</div><div class="metric-sub">Click to view</div>
    </div>
    <div class="metric" onclick="go('risks')" style="border-top:3px solid #EF4444">
      <div class="metric-val" style="color:#EF4444">${highRisk.length}</div>
      <div class="metric-label">High Risks</div><div class="metric-sub">${S.risks.filter(r=>r.status!=="Closed").length} open total</div>
    </div>
    ${msAdherence!==null?`<div class="metric" onclick="go('reporting')" style="border-top:3px solid #6366F1">
      <div class="metric-val" style="color:#6366F1">${msAdherence}%</div>
      <div class="metric-label">Milestone Rate</div><div class="metric-sub">${doneMS}/${totalMS} hit on time</div>
    </div>`:""}
  </div>

  ${df!=="All"?`<div class="callout callout-warn" style="display:flex;justify-content:space-between;align-items:center">
    <span>Showing <strong>${df}</strong> initiatives only (${active.filter(i=>i.rag===df).length} of ${active.length})</span>
    <button class="btn btn-sm btn-ghost" onclick="drillDash('All')">Show all</button>
  </div>`:""}

  <div class="grid2" style="gap:16px">
    <!-- Stream Health -->
    <div class="card">
      <span class="slabel">Focus Area Health</span>
      ${S.streams.length===0?`<div class="empty">No value streams yet.<br><button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="go('setup')">Go to Setup →</button></div>`:""}
      ${S.streams.map(s=>{
        const si=active.filter(i=>i.streamId===s.id);
        const agg=ragAgg(si.map(i=>i.rag));
        return `<div class="flex-row card-hover" style="padding:10px 6px;border-bottom:1px solid var(--border);border-radius:4px" onclick="go('stream-detail','${s.id}')">
          <div class="stream-bar" style="height:38px;background:${s.color}"></div>
          <div style="flex:1;padding-left:10px">
            <div style="font-size:13px;font-weight:600">${esc(s.name)}</div>
            <div style="font-size:11px;color:var(--muted)">${si.length} initiatives${s.lead?" · "+esc(s.lead):""}</div>
          </div>${ragChip(agg)}
        </div>`;
      }).join("")}
    </div>

    <!-- Urgent panel -->
    <div class="flex-col">
      <div class="card">
        <div class="flex-between mb-8"><span class="slabel" style="margin:0">Decisions Required Now</span><button class="btn btn-sm btn-ghost" onclick="go('decisions')">All →</button></div>
        ${openDec.length===0?`<div style="font-size:13px;color:var(--muted)">No open decisions. ✓</div>`:""}
        ${openDec.slice(0,3).map(d=>`
        <div class="card-hover" style="border-left:3px solid ${d.status==="Overdue"?"var(--red)":"var(--amber)"};padding:8px 10px;margin-bottom:6px;border-radius:4px;background:var(--panelAlt)" onclick="showRecordDecision('${d.id}')">
          <div style="font-size:13px;font-weight:600">${esc(d.description)}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:3px">${chip(d.status)} → ${esc(d.neededFrom)} · ${fmtDate(d.due)}</div>
        </div>`).join("")}
      </div>
      <div class="card">
        <div class="flex-between mb-8"><span class="slabel" style="margin:0">Overdue Actions</span><button class="btn btn-sm btn-ghost" onclick="go('actions')">All →</button></div>
        ${overdueAct.length===0?`<div style="font-size:13px;color:var(--muted)">None overdue. ✓</div>`:""}
        ${overdueAct.slice(0,3).map(a=>`
        <div style="border-left:3px solid var(--red);padding:7px 10px;margin-bottom:6px;border-radius:4px;background:var(--panelAlt)">
          <div style="font-size:13px;font-weight:600">${esc(a.desc)}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${esc(a.owner)} · Due ${fmtDate(a.due)}</div>
        </div>`).join("")}
      </div>
      <!-- CR-15: Upcoming milestones on dashboard -->
      ${upcomingMS.length>0?`<div class="card">
        <div class="flex-between mb-8"><span class="slabel" style="margin:0">Upcoming Milestones (14 days)</span></div>
        ${upcomingMS.slice(0,4).map(m=>`
        <div class="flex-row card-hover" style="padding:7px 0;border-bottom:1px solid var(--border)" onclick="go('init-detail','${m.initId}')">
          <div style="width:8px;height:8px;border-radius:50%;background:var(--indigo);flex-shrink:0"></div>
          <div style="flex:1">
            <div style="font-size:12px;font-weight:600">${esc(m.name)}</div>
            <div style="font-size:11px;color:var(--muted)">${esc(m.initName)} · ${fmtDate(m.date)}</div>
          </div>
        </div>`).join("")}
      </div>`:""}
    </div>

    <!-- Initiative Table -->
    <div class="card" style="grid-column:1/-1">
      <div class="flex-between mb-12">
        <span class="slabel" style="margin:0">Portfolio — ${df==="All"?"All Active":df}</span>
        <button class="btn btn-sm btn-primary" onclick="showAddInit()">+ Add Initiative</button>
      </div>
      ${active.filter(i=>df==="All"||i.rag===df).length===0?`<div class="empty">No initiatives${df!=="All"?" matching filter: "+df:""}.</div>`:`
      <table>
        <thead><tr><th>Initiative</th><th>Focus Area</th><th>Lead</th><th>Status</th><th>Progress</th><th>Next Milestone</th><th>Benefit</th></tr></thead>
        <tbody>
          ${active.filter(i=>df==="All"||i.rag===df).map(init=>{
            const st=S.streams.find(s=>s.id===init.streamId);
            const prog=calcInitProgress(init); // CR-16 weighted
            const ms=(init.milestones||[]).filter(m=>m.status!=="Complete").sort((a,b)=>a.date>b.date?1:-1)[0];
            return `<tr class="clickable" onclick="go('init-detail','${init.id}')">
              <td style="font-weight:600">${esc(init.name)}</td>
              <td><span style="display:inline-flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:${st?.color||"#9CA3AF"}"></span><span style="color:var(--muted)">${esc(st?.name||"—")}</span></span></td>
              <td style="color:var(--muted)">${esc(init.lead)}</td>
              <td>${ragChip(init.rag)}</td>
              <td style="min-width:80px"><div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;color:var(--muted);width:30px">${prog}%</span>${bar(prog,st?.color||"#6366F1",4)}</div></td>
              <td style="font-size:11px;color:var(--muted)">${ms?esc(ms.name)+" · "+fmtDate(ms.date):"—"}</td>
              <td style="font-family:var(--mono);color:var(--muted)">${init.benefit>0?fmt(init.benefit):"—"}</td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>`}
    </div>
  </div>`;
}
function drillDash(f){S._dashFilter=f;render();}
window.drillDash=drillDash;

function renderStreams(){
  if(!S.streams.length) return `<div class="flex-between mb-16"><h2 class="page-title">Value Streams</h2><button class="btn btn-secondary btn-sm" onclick="go('setup')">+ Add in Setup</button></div><div class="empty" style="padding:40px">No value streams yet.<br><br><button class="btn btn-primary" onclick="go('setup')">Go to Setup →</button></div>`;
  return `
  <div class="flex-between mb-16">
    <h2 class="page-title">Value Streams</h2>
    <button class="btn btn-secondary btn-sm" onclick="go('setup')">+ Add Stream</button>
  </div>
  <div class="grid2">
    ${S.streams.map(s=>{
      const si=S.initiatives.filter(i=>i.streamId===s.id&&i.portfolioStatus==="Active");
      const agg=ragAgg(si.map(i=>i.rag));
      const tb=si.reduce((t,i)=>t+i.benefit,0);
      const ta=si.reduce((t,i)=>t+(i.benefitLog||[]).reduce((x,e)=>x+e.amount,0),0);
      const h=(s.teamMembers||[]).reduce((t,m)=>t+m.hours,0);
      return `<div class="card" style="border-top:4px solid ${s.color}">
        <div class="flex-between mb-8">
          <div style="font-size:16px;font-weight:700">${esc(s.name)}</div>
          ${ragChip(agg)}
        </div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:10px">Lead: ${esc(s.lead)}${s.objectives?` · <em>${esc(s.objectives)}</em>`:""}</div>
        <div style="display:flex;gap:20px;margin-bottom:12px">
          <div><div style="font-size:22px;font-weight:700;color:${s.color}">${si.length}</div><div style="font-size:11px;color:var(--muted)">initiatives</div></div>
          ${tb>0?`<div><div style="font-size:22px;font-weight:700;color:var(--green)">${fmt(tb)}</div><div style="font-size:11px;color:var(--muted)">target${ta>0?" · "+fmt(ta)+" realised":""}</div></div>`:""}
          ${h>0?`<div><div style="font-size:22px;font-weight:700;color:var(--indigo)">${h}</div><div style="font-size:11px;color:var(--muted)">h/wk</div></div>`:""}
        </div>
        ${(s.teamMembers||[]).length>0?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px">${s.teamMembers.map(m=>`<span style="background:${s.color}15;color:${s.color};border:1px solid ${s.color}30;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600">${m.name.split(" ")[0]}</span>`).join("")}</div>`:""}
        <div class="flex-row" style="gap:8px">
          <button class="btn btn-secondary btn-sm" onclick="go('stream-detail','${s.id}')">View Initiatives</button>
          <button class="btn btn-ghost btn-sm" onclick="go('stream-edit','${s.id}')">Edit</button>
        </div>
      </div>`;
    }).join("")}
  </div>`;
}

                ${!hasBC?`<span style="font-size:10px;font-weight:700;background:var(--amberL);color:var(--amberD);border:1px solid var(--amberBorder);padding:2px 8px;border-radius:10px">No Business Case</span>`:""}

function submitWeeklyUpdate(id){
  const init=S.initiatives.find(i=>i.id===id);
  if(!init) return;
  const rag=document.getElementById("wu-rag").value;
  const note=document.getElementById("wu-note").value.trim();
  if(!note) return alert("Please enter a status note before submitting.");
  init.rag=rag;
  init.statusNote=note;
  init.lastUpdated=today();
  if(!init.weeklyUpdates) init.weeklyUpdates=[];
  init.weeklyUpdates.push({date:today(),rag,note});
  saveData(); render();
  setTimeout(()=>{const el=document.getElementById("content");if(el)el.scrollTo(0,0);},50);
}
window.submitWeeklyUpdate=submitWeeklyUpdate;

function showConvertMeetingActions(meetingId){
  const m=S.meetings.find(m=>m.id===meetingId);
  if(!m) return;
  openModal("Convert to Actions Log",`
    <div class="callout callout-tip" style="margin-bottom:12px">Meeting notes: "${esc((m.rawActions||"").substring(0,200))}${(m.rawActions||"").length>200?"…":""}"</div>
    <div class="callout callout-info" style="margin-bottom:12px">Fill in the action details below. Each action will be added to the Actions Log tagged to this meeting.</div>
    <div id="action-forms">
      <div class="action-form-item" style="border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:10px">
        <div class="fgrid2">
          <div class="frow"><label class="flabel">Action Description</label><input class="finp" id="ca-desc-0" placeholder="What needs to be done?"></div>
          <div class="frow"><label class="flabel">Owner</label>${personSelect("ca-owner-0")}</div>
          <div class="frow"><label class="flabel">Due Date</label><input class="finp" type="date" id="ca-due-0"></div>
        </div>
      </div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="addActionFormItem()" style="margin-bottom:12px">+ Add another action</button>
    <div style="display:flex;gap:8px;justify-content:flex-end">

}
window.showConvertMeetingActions=showConvertMeetingActions;

let _actionFormCount=1;
function addActionFormItem(){
  _actionFormCount++;
  const i=_actionFormCount-1;
  const container=document.getElementById("action-forms");
  const div=document.createElement("div");
  div.className="action-form-item";
  div.style.cssText="border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:10px";
  div.innerHTML=`<div class="fgrid2">
    <div class="frow"><label class="flabel">Action Description</label><input class="finp" id="ca-desc-${i}" placeholder="What needs to be done?"></div>
    <div class="frow"><label class="flabel">Owner</label>${personSelect("ca-owner-"+i)}</div>
    <div class="frow"><label class="flabel">Due Date</label><input class="finp" type="date" id="ca-due-${i}"></div>
  </div>`;
  container.appendChild(div);
}
window.addActionFormItem=addActionFormItem;

function convertMeetingActions(meetingId){
  const m=S.meetings.find(m=>m.id===meetingId);
  if(!m) return;
  let added=0;
  for(let i=0;i<_actionFormCount;i++){
    const desc=document.getElementById(`ca-desc-${i}`)?.value.trim();
    const owner=getPersonVal(`ca-owner-${i}`);
    const due=document.getElementById(`ca-due-${i}`)?.value;
    if(desc&&owner){
      S.actions.push({id:uid(),desc,owner,due,status:"Not Started",sourceMeeting:meetingId});
      added++;
    }
  }
  if(!added) return alert("Please fill in at least one action with a description and owner.");
  m.status="Converted";
  _actionFormCount=1;
  closeModal(); saveData(); renderNav(); render();
}
window.convertMeetingActions=convertMeetingActions;

// DECISIONS — CR-11 overdue logic visible, CR-12 level tagging, CR-05 confirm
// ══════════════════════════════════════════════════════════════════════════════
function renderDecisions(){
  // CR-11: auto-mark overdue on render
  S.decisions.forEach(d=>{
    if(d.status==="Open"&&isOverdue(d.due)) d.status="Overdue";
  });
  const tab=S._decTab||"Open";
  const groups={Open:S.decisions.filter(d=>d.status==="Open"),Overdue:S.decisions.filter(d=>d.status==="Overdue"),Made:S.decisions.filter(d=>d.status==="Made")};
  const list=groups[tab]||[];
  return `
  <div class="flex-between mb-12">
    <h2 class="page-title">Decisions & Escalation Log</h2>
    <button class="btn btn-primary btn-sm" onclick="showAddDecision()">+ Log Decision</button>
  </div>
  <div class="callout callout-tip" style="margin-bottom:14px"><strong>Overdue logic:</strong> A decision becomes Overdue automatically when today passes the Due Date and the decision is still Open. Click any open/overdue decision card to record it.</div>
  <div class="tabs">
    ${[["Open","Open ("+groups.Open.length+")"],["Overdue","Overdue ("+groups.Overdue.length+")"],["Made","Made ("+groups.Made.length+")"]].map(([t,l])=>`<button class="tab${tab===t?" active":""}" onclick="setDT('${t}')">${l}</button>`).join("")}
  </div>
  ${list.length===0?`<div class="empty">No ${tab.toLowerCase()} decisions.</div>`:`
  <div class="flex-col">
    ${list.map(d=>{
      const related=S.initiatives.find(i=>i.id===d.relatedId);
      const isClickable=d.status!=="Made";
      return `<div class="card${isClickable?" card-hover":""}" style="border-left:4px solid ${d.status==="Made"?"var(--green)":d.status==="Overdue"?"var(--red)":"var(--amber)"}${isClickable?";cursor:pointer":""}" ${isClickable?`onclick="showRecordDecision('${d.id}')"`:""}>
        <div class="flex-between" style="gap:12px;flex-wrap:wrap">
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600;margin-bottom:6px">${esc(d.description)}</div>
            <div style="display:flex;gap:12px;font-size:11px;color:var(--muted);flex-wrap:wrap">
              <span>From: <strong>${esc(d.neededFrom)}</strong></span>
              <span>Due: <strong style="color:${d.status==="Overdue"?"var(--red)":"var(--text)"}">${fmtDate(d.due)}</strong></span>
              ${related?`<span>Initiative: <span style="color:var(--indigo)">${esc(related.name)}</span></span>`:""}
              <span>Level: ${chip(d.level||"Initiative")}</span>
            </div>
            ${d.consequence&&!d.decision?`<div style="margin-top:7px;font-size:12px;color:var(--red);background:var(--redL);padding:5px 8px;border-radius:4px">If not made: ${esc(d.consequence)}</div>`:""}
            ${d.decision?`<div style="margin-top:7px;font-size:12px;color:var(--greenD);background:var(--greenL);padding:5px 8px;border-radius:4px">✓ ${esc(d.decision)}${d.decisionDate?" · "+fmtDate(d.decisionDate):""}</div>`:""}
          </div>
          ${chip(d.status)}
        </div>
        ${isClickable?`<div style="margin-top:8px;font-size:11px;color:var(--dim)">↑ Click to record decision</div>`:""}
      </div>`;
    }).join("")}
  </div>`}`;
}
function setDT(t){S._decTab=t;render();}
window.setDT=setDT;

function showAddDecision(){
  openModal("Log Decision Required",`
    <div class="frow"><label class="flabel">What decision is needed?</label>
      <textarea class="ftxt" id="m-ddesc" rows="2" placeholder="e.g. Approve production planning template before training begins"></textarea>
    </div>
    <div class="fgrid2">
      <div class="frow"><label class="flabel">Decision needed from</label>${personSelect("m-dfrom")}</div>
      <!-- CR-11: due date tooltip explains overdue trigger -->
      <div class="frow"><label class="flabel">Due by <span style="font-size:10px;color:var(--amber);font-weight:400">(becomes Overdue after this date)</span></label><input class="finp" type="date" id="m-ddue"></div>
      <!-- CR-12: level tagging -->
      <div class="frow"><label class="flabel">Level</label>
        <select class="fsel" id="m-dlevel"><option>Initiative</option><option>Activity</option><option>Stream</option><option>Programme</option><option>${S.programme.governanceBody||"SteerCo"}</option></select>
      </div>
      <div class="frow"><label class="flabel">Related Initiative</label>
        <select class="fsel" id="m-drelated"><option value="">None</option>${S.initiatives.map(i=>`<option value="${i.id}">${esc(i.name)}</option>`).join("")}</select>
      </div>
    </div>
    <div class="frow"><label class="flabel">What happens if not made by due date? (mandatory)</label>
      <input class="finp" id="m-dconseq" placeholder="e.g. Training cannot start — initiative stays Behind Schedule">

      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>

window.showAddDecision=showAddDecision;

function showAddDecisionFor(relatedId){
  S._pendingRelatedId=relatedId;
  showAddDecision();
  // Pre-select related initiative after modal opens
  setTimeout(()=>{
    const sel=document.getElementById("m-drelated");
    if(sel) sel.value=relatedId;
  },50);
}
window.showAddDecisionFor=showAddDecisionFor;

function addDecision(){
  const desc=document.getElementById("m-ddesc").value.trim();
  const from=getPersonVal("m-dfrom");
  const conseq=document.getElementById("m-dconseq").value.trim();
  if(!desc||!from||!conseq) return alert("Description, 'needed from' and consequence are all required.");
  const relId=S._pendingRelatedId||document.getElementById("m-drelated").value||null;
  S._pendingRelatedId=null;
  const due=document.getElementById("m-ddue").value;
  const status=isOverdue(due)?"Overdue":"Open"; // CR-11: auto-detect on creation
  S.decisions.push({id:uid(),description:desc,neededFrom:from,due,level:document.getElementById("m-dlevel").value,consequence:conseq,status,decision:null,relatedId:relId,decisionDate:""});
  closeModal(); saveData(); renderNav(); render();
}
window.addDecision=addDecision;

function showRecordDecision(id){
  const d=S.decisions.find(d=>d.id===id);
  if(!d) return;
  openModal("Record Decision",`
    <div style="margin-bottom:12px;font-size:13px;color:var(--muted)">Required from: <strong>${esc(d.neededFrom)}</strong> · Due: ${fmtDate(d.due)}</div>
    ${d.consequence?`<div class="callout callout-warn" style="margin-bottom:12px">If not made: ${esc(d.consequence)}</div>`:""}
    <div class="frow"><label class="flabel">What was decided?</label>
      <textarea class="ftxt" id="m-rdtext" rows="3" placeholder="Record the decision exactly as made — this is a governance record"></textarea>
    </div>
    <!-- CR-11: decision date required -->
    <div class="frow"><label class="flabel">Date Decision Was Made</label><input class="finp" type="date" id="m-rddate" value="${today()}"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="recordDecision('${id}')">Save Decision</button>
    </div>`);
}
window.showRecordDecision=showRecordDecision;

function recordDecision(id){
  const text=document.getElementById("m-rdtext").value.trim();
  const date=document.getElementById("m-rddate").value;
  if(!text) return alert("Please enter the decision text.");
  const d=S.decisions.find(d=>d.id===id);
  if(d){d.status="Made";d.decision=text;d.decisionDate=date||today();}
  closeModal(); saveData(); renderNav(); render();
}
window.recordDecision=recordDecision;

// ══════════════════════════════════════════════════════════════════════════════
// ACTIONS — CR-05 confirm, CR-10 dates, CR-13 source meeting tag
// ══════════════════════════════════════════════════════════════════════════════
function renderActions(){
  // Auto-update overdue status
  S.actions.forEach(a=>{if(isOverdue(a.due)&&a.status!=="Done"&&a.status!=="Overdue")a.status="Overdue";});
  const groups={
    Overdue:S.actions.filter(a=>a.status==="Overdue"),
    "In Progress":S.actions.filter(a=>a.status==="In Progress"),
    "Not Started":S.actions.filter(a=>a.status==="Not Started"),
    Done:S.actions.filter(a=>a.status==="Done"),
  };
  const gc={Overdue:"var(--red)","In Progress":"var(--indigo)","Not Started":"var(--grey)",Done:"var(--green)"};
  return `
  <div class="flex-between mb-12">
    <h2 class="page-title">Actions Log</h2>
    <button class="btn btn-primary btn-sm" onclick="showAddAction()">+ New Action</button>
  </div>
  ${Object.entries(groups).map(([group,acts])=>`
  <div style="margin-bottom:20px">
    <div class="flex-row" style="gap:8px;margin-bottom:8px">
      <span style="width:8px;height:8px;border-radius:50%;background:${gc[group]}"></span>
      <span style="font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted)">${group} (${acts.length})</span>
    </div>
    ${acts.length===0?`<div style="font-size:12px;color:var(--dim);padding-left:16px">None.</div>`:`
    <div class="flex-col" style="gap:6px">
      ${acts.map(a=>{
        const bc=a.status==="Done"?"var(--green)":a.status==="Overdue"?"var(--red)":a.status==="In Progress"?"var(--indigo)":"var(--grey)";
        const meeting=a.sourceMeeting?S.meetings.find(m=>m.id===a.sourceMeeting):null;
        const related=S.initiatives.find(i=>i.id===a.relatedId)||S.streams.find(s=>s.id===a.relatedId);
        return `<div class="card" style="border-left:4px solid ${bc}">
          <div class="flex-between" style="gap:10px">
            <div style="flex:1">
              <div style="font-size:13px;font-weight:600;margin-bottom:4px">${esc(a.desc)}</div>
              <div style="font-size:11px;color:var(--muted)">
                Owner: <strong>${esc(a.owner)}</strong> · Due: <strong style="color:${a.status==="Overdue"?"var(--red)":"var(--text)"}">${fmtDate(a.due)||"no date"}</strong>
                ${related?` · <span style="color:var(--indigo)">${esc(related.name)}</span>`:""}
                ${meeting?` · <span style="color:var(--muted);font-size:10px">from meeting ${fmtDate(meeting.date)}</span>`:""}
              </div>
            </div>
            <div class="flex-row" style="gap:6px">
              ${chip(a.status)}
              ${a.status!=="Done"?`<button class="btn btn-green btn-sm" onclick="markActionDone('${a.id}')">✓ Done</button>`:""}
              <button class="btn btn-danger btn-sm" onclick="deleteAction('${a.id}')">×</button>
            </div>
          </div>
        </div>`;
      }).join("")}
    </div>`}
  </div>`).join("")}`;
}

function addAction(){

  S.actions.push({id:uid(),desc,owner,due:document.getElementById("m-aactiondue").value,status:document.getElementById("m-aactionstatus").value,relatedId:document.getElementById("m-arelated").value||null,sourceMeeting:""});

function markActionDone(id){

  saveData(); renderNav(); render();
}

function deleteAction(id){

// RISK REGISTER — CR-21 initiative link, risk at stream/initiative level

  <div class="filter-pills">

        <div class="flex-between mb-8">
          <div style="font-size:13px;font-weight:600">${esc(r.title)}</div>
          <div class="flex-row" style="gap:6px">${statusBadge(r.level)}${chip(r.status||"Open")}</div>
        </div>
        ${r.description?`<div style="font-size:12px;color:var(--muted);margin-bottom:6px">${esc(r.description)}</div>`:""}
        ${r.mitigation?`<div style="font-size:12px;color:var(--dim)"><strong>Mitigation:</strong> ${esc(r.mitigation)}</div>`:""}
        <div style="display:flex;gap:14px;margin-top:8px;font-size:11px;color:var(--muted)">

function saveRisk(id){

function renderReporting(){
  const tab=S._reportTab||"portfolio";
  const active=S.initiatives.filter(i=>i.portfolioStatus==="Active");
  const totalB=active.reduce((s,i)=>s+i.benefit,0);
  const totalA=active.reduce((s,i)=>s+(i.benefitLog||[]).reduce((t,e)=>t+e.amount,0),0);
  return `
  <div class="flex-between mb-12">
    <h2 class="page-title">Reporting</h2>
    <button class="btn btn-ghost btn-sm no-print" onclick="window.print()">🖨 Print view</button>
  </div>
  <div class="tabs no-print">
    ${[["portfolio","Portfolio Overview"],["streams","By Focus Area"],["milestones","Milestones"],["utilisation","Resource Utilisation"],["financial","Financial Tracker"],["kpireport","KPI Summary"]].map(([t,l])=>`<button class="tab${tab===t?" active":""}" onclick="setRT('${t}')">${l}</button>`).join("")}
  </div>
  ${tab==="portfolio"?renderReportPortfolio(active,totalB,totalA):""}
  ${tab==="streams"?renderReportStreams(active):""}
  ${tab==="milestones"?renderReportMilestones(active):""}
  ${tab==="utilisation"?renderReportUtilisation(active):""}
  ${tab==="financial"?renderReportFinancial(active,totalB,totalA):""}

function setRT(t){S._reportTab=t;render();}
window.setRT=setRT;

function renderReportPortfolio(active,totalB,totalA){
  const openDec=S.decisions.filter(d=>d.status!=="Made").length;
  const madeDec=S.decisions.filter(d=>d.status==="Made").length;
  const overdueAct=S.actions.filter(a=>isOverdue(a.due)&&a.status!=="Done").length;
  const doneAct=S.actions.filter(a=>a.status==="Done").length;
  const allActs=S.activities;
  const actDone=allActs.filter(a=>a.status==="Complete").length;
  return `
  <div class="metrics">
    <div class="metric"><div class="metric-val" style="color:var(--indigo)">${fmt(totalB)}</div><div class="metric-label">Benefit Target</div><div class="metric-sub">across active initiatives</div></div>
    <div class="metric"><div class="metric-val" style="color:var(--green)">${fmt(totalA)}</div><div class="metric-label">Benefit Realised</div><div class="metric-sub">${totalB>0?Math.round((totalA/totalB)*100):0}% of target</div></div>
    <div class="metric"><div class="metric-val" style="color:var(--amber)">${openDec}</div><div class="metric-label">Open Decisions</div><div class="metric-sub">${madeDec} made</div></div>
    <div class="metric"><div class="metric-val" style="color:var(--red)">${overdueAct}</div><div class="metric-label">Overdue Actions</div><div class="metric-sub">${doneAct} done</div></div>
  </div>
  <div class="grid2" style="gap:14px">
    <div class="card">
      <span class="slabel">Initiative Performance</span>
      ${active.length===0?`<div class="empty">No active initiatives.</div>`:""}
      ${active.map(init=>{
        const prog=calcInitProgress(init);
        const realised=(init.benefitLog||[]).reduce((t,e)=>t+e.amount,0);
        const pct=init.benefit>0?Math.round((realised/init.benefit)*100):0;
        const st=S.streams.find(s=>s.id===init.streamId);
        return `<div style="padding:10px 0;border-bottom:1px solid var(--border)">
          <div class="flex-between mb-8"><div style="font-size:13px;font-weight:600">${esc(init.name)}</div>${ragChip(init.rag)}</div>
          <div class="flex-row" style="gap:8px;margin-bottom:4px">
            <span style="font-size:11px;color:var(--muted)">Progress</span>
            <span style="font-size:11px;font-weight:700">${prog}%</span>
          </div>
          ${bar(prog,st?.color||"#6366F1")}
          ${init.benefit>0?`<div style="font-size:11px;color:var(--muted);margin-top:4px;font-family:var(--mono)">Benefit: ${fmt(realised)} / ${fmt(init.benefit)} (${pct}%)</div>`:""}
          ${init.kpis?.[0]?`<div style="font-size:11px;color:var(--dim);margin-top:3px">${esc(init.kpis[0].name)}: <span style="color:var(--copper);font-weight:700">${esc(init.kpis[0].current)}</span> → ${esc(init.kpis[0].target)}</div>`:""}
        </div>`;
      }).join("")}
    </div>
    <div class="card">
      <span class="slabel">Portfolio Health</span>
      <div style="display:flex;gap:8px;margin-bottom:14px">
        ${[["Open",S.decisions.filter(d=>d.status==="Open").length,"var(--amber)","var(--amberL)"],["Overdue",S.decisions.filter(d=>d.status==="Overdue").length,"var(--red)","var(--redL)"],["Made",madeDec,"var(--green)","var(--greenL)"]].map(([l,v,c,bg])=>`<div style="flex:1;background:${bg};border-radius:6px;padding:10px 12px;text-align:center"><div style="font-size:22px;font-weight:700;color:${c};font-family:var(--mono)">${v}</div><div style="font-size:10px;color:${c};font-weight:700;text-transform:uppercase;letter-spacing:1px">${l}</div></div>`).join("")}
      </div>
      ${["On Track","At Risk","Behind Schedule","On Hold"].map(s=>{const r=RAG[s];return `<div class="flex-between" style="padding:7px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px;color:var(--muted)">${s}</span><span style="font-size:16px;font-weight:700;color:${r.c};font-family:var(--mono)">${active.filter(i=>i.rag===s).length}</span></div>`;}).join("")}
      <div style="margin-top:12px">
        <div class="flex-between" style="font-size:11px;color:var(--muted);margin-bottom:4px"><span>Activity completion</span><span style="font-family:var(--mono)">${allActs.length?Math.round((actDone/allActs.length)*100):0}%</span></div>
        ${bar(allActs.length?(actDone/allActs.length)*100:0,"#6366F1",5)}
      </div>
    </div>
  </div>`;
}

// CR-15: Milestone report tab
function renderReportMilestones(active){
  const allMS=active.flatMap(i=>(i.milestones||[]).map(m=>({...m,initName:i.name,initId:i.id,rag:i.rag})));
  const doneMS=allMS.filter(m=>m.status==="Complete").length;
  const overdueMS=allMS.filter(m=>isOverdue(m.date)&&m.status!=="Complete").length;
  const adherence=allMS.length?Math.round((doneMS/allMS.length)*100):null;
  return `
  <div class="metrics">
    <div class="metric"><div class="metric-val" style="color:var(--indigo)">${allMS.length}</div><div class="metric-label">Total Milestones</div></div>
    <div class="metric"><div class="metric-val" style="color:var(--green)">${doneMS}</div><div class="metric-label">Complete</div></div>
    <div class="metric"><div class="metric-val" style="color:var(--red)">${overdueMS}</div><div class="metric-label">Overdue</div></div>
    ${adherence!==null?`<div class="metric"><div class="metric-val" style="color:var(--copper)">${adherence}%</div><div class="metric-label">Adherence Rate</div><div class="metric-sub">milestones hit on time</div></div>`:""}
  </div>
  <div class="card">
    <span class="slabel">All Milestones by Initiative</span>
    ${allMS.length===0?`<div class="empty">No milestones logged yet.</div>`:""}
    <table>
      <thead><tr><th>Milestone</th><th>Initiative</th><th>Due</th><th>Status</th></tr></thead>
      <tbody>
        ${allMS.sort((a,b)=>a.date>b.date?1:-1).map(m=>{
          const ov=isOverdue(m.date)&&m.status!=="Complete";
          return `<tr class="clickable" onclick="go('init-detail','${m.initId}')">
            <td style="font-weight:600">${esc(m.name)}</td>
            <td style="color:var(--muted)">${esc(m.initName)}</td>
            <td style="font-family:var(--mono);font-size:12px;color:${ov?"var(--red)":"var(--text)"}">${fmtDate(m.date)||"—"}${ov?" ⚠":""}</td>
            <td>${chip(m.status||"Not Started")}</td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>
  </div>`;
}

function renderReportStreams(active){
  if(!S.streams.length) return `<div class="empty">No value streams yet.</div>`;
  return `<div class="flex-col">
    ${S.streams.map(s=>{
      const si=active.filter(i=>i.streamId===s.id);
      const sActs=si.flatMap(i=>S.activities.filter(a=>a.initId===i.id));
      const sDone=sActs.filter(a=>a.status==="Complete").length;
      const sPct=sActs.length?Math.round((sDone/sActs.length)*100):0;
      const agg=ragAgg(si.map(i=>i.rag));
      const tb=si.reduce((t,i)=>t+i.benefit,0);
      const ta=si.reduce((t,i)=>t+(i.benefitLog||[]).reduce((x,e)=>x+e.amount,0),0);
      return `<div class="card">
        <div class="flex-between mb-10">
          <div style="border-left:4px solid ${s.color};padding-left:12px">
            <div style="font-size:15px;font-weight:700">${esc(s.name)}</div>
            <div style="font-size:11px;color:var(--muted)">Lead: ${esc(s.lead)} · ${si.length} initiatives</div>
          </div>
          <div class="flex-row" style="gap:8px">${ragChip(agg)}<span style="font-size:13px;font-weight:700;font-family:var(--mono)">${sPct}%</span></div>
        </div>
        ${bar(sPct,s.color,5)}
        ${tb>0?`<div style="font-size:11px;color:var(--muted);margin-top:8px;font-family:var(--mono)">Benefit: ${fmt(ta)} realised / ${fmt(tb)} target (${Math.round((ta/tb)*100)||0}%)</div>`:""}
        <div style="margin-top:14px">
          <table><thead><tr><th>Initiative</th><th>Status</th><th>Progress</th><th>Lead</th><th>Benefit</th></tr></thead>
          <tbody>${si.map(i=>{const prog=calcInitProgress(i);return `<tr class="clickable" onclick="go('init-detail','${i.id}')"><td style="font-weight:600">${esc(i.name)}</td><td>${ragChip(i.rag)}</td><td style="min-width:80px"><div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;width:30px;color:var(--muted)">${prog}%</span>${bar(prog,s.color,3)}</div></td><td style="color:var(--muted)">${esc(i.lead)}</td><td style="font-family:var(--mono);color:var(--muted)">${i.benefit>0?fmt(i.benefit):"—"}</td></tr>`;}).join("")}</tbody>
          </table>
        </div>
      </div>`;
    }).join("")}
  </div>`;
}

function renderReportUtilisation(active){
  // CR-19: programme-level master list drives this
  const personMap=new Map();
  const add=(name,h,src)=>{
    if(!name) return;
    if(!personMap.has(name)) personMap.set(name,{hours:0,sources:[],allocated:[]});
    const p=personMap.get(name);
    p.hours+=h||0;
    if(src&&!p.sources.includes(src)) p.sources.push(src);
  };
  S.streams.forEach(s=>(s.teamMembers||[]).forEach(m=>add(m.name,m.hours,s.name)));
  active.forEach(i=>add(i.lead,i.weeklyHours,i.name));
  S.activities.forEach(a=>{
    if(a.lead&&a.status!=="Complete"){
      const init=S.initiatives.find(i=>i.id===a.initId);
      add(a.lead,2,init?.name);
    }
  });
  const people=[...personMap.entries()].sort((a,b)=>b[1].hours-a[1].hours);
  const maxH=people.length?people[0][1].hours:1;
  const totalH=active.reduce((s,i)=>s+i.weeklyHours,0);
  return `
  <div class="metrics">
    <div class="metric"><div class="metric-val" style="color:var(--indigo)">${totalH}</div><div class="metric-label">Total Hrs/Week</div><div class="metric-sub">committed to active work</div></div>
    <div class="metric"><div class="metric-val" style="color:var(--copper)">${people.length}</div><div class="metric-label">People Tracked</div></div>
    <div class="metric"><div class="metric-val" style="color:var(--red)">${people.filter(([,v])=>v.hours>=20).length}</div><div class="metric-label">Potential Overload</div><div class="metric-sub">20+ hrs/week</div></div>
  </div>
  <div class="card">
    <span class="slabel">Resource Utilisation — 80/20 View (designed for cloud hosting)</span>
    ${people.length===0?`<div class="empty">No resource data yet. Add team members to streams and assign activity leads.</div>`:""}
    ${people.slice(0,20).map(([name,data])=>{
      const pct=Math.round((data.hours/maxH)*100);
      const overload=data.hours>=20;
      const tm=S.teamMembers.find(m=>m.name===name);
      return `<div style="margin-bottom:14px">
        <div class="flex-between mb-8">
          <div class="flex-row" style="gap:10px">
            <div style="width:34px;height:34px;border-radius:50%;background:${overload?"var(--redL)":"var(--indigoL)"};color:${overload?"var(--red)":"var(--indigo)"};border:2px solid ${overload?"var(--redBorder)":"var(--indigoBorder)"};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0">${name.charAt(0).toUpperCase()}</div>
            <div>
              <div style="font-size:13px;font-weight:600">${esc(name)}${tm?.role?" <span style='color:var(--muted);font-size:11px'>— "+esc(tm.role)+"</span>":""}</div>
              <div style="font-size:11px;color:var(--muted)">${data.sources.slice(0,3).map(esc).join(" · ")}</div>
            </div>
          </div>
          <span style="font-size:14px;font-weight:700;font-family:var(--mono);color:${overload?"var(--red)":"var(--muted)"}">${data.hours}h/wk${overload?" ⚠":""}</span>
        </div>
        ${bar(pct,overload?"#EF4444":"#6366F1",6)}
      </div>`;
    }).join("")}
  </div>`;
}

function renderReportFinancial(active,totalB,totalA){
  return `
  <div class="metrics">
    <div class="metric"><div class="metric-val" style="color:var(--indigo)">${fmt(totalB)}</div><div class="metric-label">Total Target</div></div>
    <div class="metric"><div class="metric-val" style="color:var(--green)">${fmt(totalA)}</div><div class="metric-label">Total Realised</div><div class="metric-sub">${totalB>0?Math.round((totalA/totalB)*100):0}%</div></div>
    <div class="metric"><div class="metric-val" style="color:var(--muted)">${active.reduce((s,i)=>s+i.weeklyHours,0)}</div><div class="metric-label">Hrs/Wk</div></div>
  </div>
  <div class="card">
    <span class="slabel">Financial Tracker — Benefit Log</span>
    <table>
      <thead><tr><th>Initiative</th><th>Target</th><th>Realised</th><th>% Achieved</th><th>Hrs/Wk</th><th>Status</th></tr></thead>
      <tbody>
        ${active.map(init=>{
          const realised=(init.benefitLog||[]).reduce((t,e)=>t+e.amount,0);
          const pct=init.benefit>0?Math.round((realised/init.benefit)*100):0;
          return `<tr class="clickable" onclick="go('init-detail','${init.id}')">
            <td style="font-weight:600">${esc(init.name)}</td>
            <td style="font-family:var(--mono);color:var(--muted)">${init.benefit>0?fmt(init.benefit):"—"}</td>
            <td style="font-family:var(--mono);font-weight:700;color:var(--green)">${fmt(realised)}</td>
            <td><div style="display:flex;align-items:center;gap:8px"><span style="font-family:var(--mono);font-size:12px;width:35px;color:var(--muted)">${pct}%</span>${bar(pct,"#10B981",4)}</div></td>
            <td style="font-family:var(--mono);color:var(--muted)">${init.weeklyHours||0}h</td>
            <td>${ragChip(init.rag)}</td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>
  </div>`;
}

function renderReportKPI(active){
  const allKPIs=active.flatMap(i=>i.kpis.map(k=>({...k,initName:i.name,initId:i.id,rag:i.rag})));
  return `
  <div class="card">
    <span class="slabel">KPI Summary — All Initiatives</span>
    ${allKPIs.length===0?`<div class="empty">No KPIs logged yet.</div>`:""}
    ${allKPIs.map(k=>`
    <div style="padding:12px 0;border-bottom:1px solid var(--border)">
      <div class="flex-between mb-8">
        <div>
          <div style="font-size:13px;font-weight:600">${esc(k.name)}</div>
          <div style="font-size:11px;color:var(--muted)">Initiative: <span style="color:var(--indigo);cursor:pointer" onclick="go('init-detail','${k.initId}')">${esc(k.initName)}</span></div>
        </div>
        <div class="flex-row" style="gap:6px">${chip(k.type,"#6366F1","#EEF2FF","#C7D2FE")}${ragChip(k.rag)}</div>
      </div>
      <div style="display:flex;gap:24px;font-size:12px;font-family:var(--mono)">
        <div><span style="color:var(--muted)">BASE </span><span>${esc(k.baseline)}</span></div>
        <div><span style="color:var(--muted)">TARGET </span><span>${esc(k.target)}</span></div>
        <div><span style="color:var(--muted)">NOW </span><span style="font-weight:700;color:var(--copper)">${esc(k.current)}</span></div>
      </div>
    </div>`).join("")}
  </div>`;
}
